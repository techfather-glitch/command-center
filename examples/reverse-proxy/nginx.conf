# nginx — TLS termination + forwarded headers + SSE passthrough.
# Assumes certs from certbot/acme.sh. Set PUBLIC_URL=https://cc.example.com.

server {
    listen 443 ssl http2;
    server_name cc.example.com;

    ssl_certificate     /etc/letsencrypt/live/cc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cc.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8888;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Server-Sent Events (the live feed) must not be buffered.
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  1h;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
    }
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    server_name cc.example.com;
    return 301 https://$host$request_uri;
}
