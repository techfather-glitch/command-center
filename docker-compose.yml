# Command Center — Docker Compose deployment.
#   1. (optional) edit the values below — a sign-in password, your external URL
#   2. docker compose up -d
#   3. open http://localhost:8888
# The container runs as root so it can write to ./data regardless of who owns the
# host folder. To run unprivileged instead, add `user: "1000:1000"` and make
# ./data writable by that uid.
services:
  command-center:
    image: ghcr.io/techfather-glitch/command-center:latest
    # To build locally instead of pulling, comment out `image:` and use:
    # build: .
    container_name: command-center
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data          # settings, encrypted vault, audit log — keep this line
    environment:
      - TZ=UTC
      # Sign-in password. To require one, type it right here, e.g.
      #   - DASHBOARD_PASSWORD=my-long-passphrase-2026
      # It overrides any password set in the UI. Leave empty for no built-in sign-in.
      - DASHBOARD_PASSWORD=
      # External URL when behind a reverse proxy — keeps links + secure cookies correct, e.g.
      #   - PUBLIC_URL=https://cc.example.com
      - PUBLIC_URL=
      - TRUST_PROXY=1
      # - DEMO=1                    # uncomment to explore with fully synthetic data
    restart: unless-stopped
