    .ig-cat-badge { flex: 0 0 auto; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 7px; border: 1px solid var(--border); color: var(--muted); }
    .ig-cat-badge.on { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
    .ig-cat-cfg { padding: 4px 14px 14px; border-top: 1px solid var(--border-soft); }
    .ig-cat-act { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
    .ig-test-res { font-size: 12.5px; font-weight: 600; }
    .ig-test-res.ok { color: var(--green); } .ig-test-res.bad { color: var(--red); }
    @media (max-width: 560px) { .ig-cat.open { grid-column: 1; } }
    .ig-discover { display: flex; gap: 11px; align-items: flex-start; padding: 12px 14px; margin-bottom: 12px; border-radius: 12px; border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border-soft)); background: color-mix(in srgb, var(--accent) 7%, transparent); font-size: 13px; }
    .ig-disc-ico { font-size: 16px; flex: 0 0 auto; }
    .ig-disc-body { line-height: 1.9; }
    .ig-disc-chip { border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--border)); background: var(--card); color: var(--accent); font-size: 12px; font-weight: 650; padding: 3px 10px; border-radius: 999px; cursor: pointer; margin: 0 2px; }
    .ig-disc-chip:hover { background: color-mix(in srgb, var(--accent) 16%, var(--card)); }

    /* ---- Theme picker ---- */
    .theme-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .theme-sw { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px 8px 10px; border-radius: 999px; border: 1px solid var(--border); background: var(--card-2); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: border-color .14s, color .14s; }
    .theme-sw:hover { color: var(--text); }
    .theme-sw.active { color: var(--text); border-color: color-mix(in srgb, var(--sw1) 60%, var(--border)); box-shadow: 0 0 0 1px color-mix(in srgb, var(--sw1) 40%, transparent); }
    .theme-dot { width: 18px; height: 18px; border-radius: 999px; flex: 0 0 auto; background: linear-gradient(135deg, var(--sw1), var(--sw2)); box-shadow: 0 0 8px color-mix(in srgb, var(--sw1) 55%, transparent); }
    /* first-run welcome + adaptive dashboard grid */
    
    .welcome { max-width: 580px; width: 100%; text-align: center; padding: 40px 36px; display: flex; flex-direction: column; align-items: center; gap: 14px; }

    .welcome-cta .tbtn { text-decoration: none; }
    
    .ig-discover-dash { margin-top: 0; }
    /* Settings: collapse the long integration catalog until "Browse all" */
    .ig-cat-grid:not(.show-all) .ig-cat-extra { display: none; }
    .ig-browse-all { width: 100%; justify-content: center; }

    /* native (Grafana-free) metrics overview */
    
    .metric-native .mq { margin-top: 14px; }
    .metric-native .mq:first-of-type { margin-top: 12px; }
    .mq-h { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
    .mq-h b { font-size: 15px; font-weight: 700; color: var(--text); }
    .mq-h b.warn { color: var(--yellow); } .mq-h b.bad { color: var(--red); }
    .mq-spark .spark { width: 100%; height: 46px; display: block; }
    .mq-list { margin-top: 12px; display: flex; flex-direction: column; gap: 9px; }
    .mq-row { display: flex; align-items: center; gap: 11px; font-size: 13px; }
    .mq-nm { flex: 0 0 36%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mq-bar { flex: 1; height: 7px; border-radius: 999px; background: var(--card-2); overflow: hidden; }
    .mq-bar span { display: block; height: 100%; border-radius: 999px; background: var(--live); }
    .mq-bar span.warn { background: var(--warn); }
    .mq-bar span.bad { background: var(--crit); }
    .mq-bar-lg { height: 9px; margin-top: 3px; }
    .mq-v { flex: 0 0 auto; color: var(--faint); font-size: 12px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .metric-connect { margin-top: 2px; }

    /* custom tiles (bookmark / iframe / custom-api escape hatch) */
    .ct-add { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }
    .ct-add .set-input { flex: 1 1 160px; min-width: 0; }
    .ct-maps { flex-basis: 100%; min-height: 64px; resize: vertical; font-family: var(--mono, ui-monospace, monospace); font-size: 12px; line-height: 1.5; }
    .ct-ico { font-size: 18px; flex: 0 0 auto; width: 26px; text-align: center; }
    .ct-tag { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); border: 1px solid var(--border-soft); border-radius: 5px; padding: 1px 5px; }
    a.ct-link { text-decoration: none; color: inherit; display: block; transition: border-color .14s, transform .12s; }
    a.ct-link:hover { border-color: var(--hair-2); background: var(--s1); }
    .ct-url { font-size: 12px; color: var(--faint); margin-top: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ct-frame { display: flex; flex-direction: column; }
    .ct-iframe { width: 100%; border: 0; border-radius: 10px; margin-top: 10px; background: var(--card-2); }

    /* ============================================================== *
     *  SLATE — redesign shell + component system (overrides legacy)  *
     * ============================================================== */
    .app { display: grid; grid-template-columns: auto 1fr; grid-template-rows: auto 1fr auto;
        grid-template-areas: "rail topbar" "rail view" "rail dock"; height: 100vh; background: var(--bg-0); min-height: 0; }
    /* ── Rail (collapsible icon sidebar) ── */
    .rail { grid-area: rail; width: 232px; background: var(--bg-0); display: grid; grid-template-rows: auto 1fr auto;
        padding: var(--s-3); gap: var(--s-2); transition: width var(--t-view) var(--ease); overflow: hidden; border-right: 1px solid var(--line-1); }
    .rail[data-collapsed="true"] { width: 60px; }
    .rail-brand { display: flex; align-items: center; gap: var(--s-3); height: 40px; padding: 0 var(--s-2); }
    .rail-logo { width: 30px; height: 30px; border-radius: 9px; flex: 0 0 auto; display: grid; place-items: center;
        color: #06231f; background: linear-gradient(140deg, var(--accent), var(--accent-2)); box-shadow: var(--sh-1); }
    .rail-logo svg { width: 18px; height: 18px; }
    .rail-wordmark { font: 600 14px/1 var(--font); color: var(--text-1); letter-spacing: -0.01em; white-space: nowrap; }
    .rail-collapse { margin-left: auto; width: 26px; height: 26px; display: grid; place-items: center; background: transparent;
        border: 0; border-radius: var(--r-chip); color: var(--text-3); cursor: pointer; transition: color var(--t-micro) var(--ease), background var(--t-micro) var(--ease); }
    .rail-collapse:hover { color: var(--text-1); background: rgba(255,255,255,0.05); }
    .rail-collapse svg { width: 16px; height: 16px; }
    .rail[data-collapsed="true"] .rail-wordmark, .rail[data-collapsed="true"] .rail-collapse, .rail[data-collapsed="true"] .rail-label, .rail[data-collapsed="true"] .rail-sect { display: none; }
    .rail[data-collapsed="true"] .rail-brand { justify-content: center; padding: 0; }
    .rail-nav { display: flex; flex-direction: column; gap: 2px; overflow-y: auto; overflow-x: hidden; margin: var(--s-2) 0; }
    .rail-sect { font: var(--fw-eyebrow) var(--fs-eyebrow)/var(--lh-eyebrow) var(--font); letter-spacing: 0.05em; text-transform: uppercase;
        color: var(--text-4); padding: var(--s-3) var(--s-3) var(--s-1); white-space: nowrap; }
    .rail-item { display: flex; align-items: center; gap: var(--s-3); height: 36px; padding: 0 var(--s-3); border-radius: var(--r-input);
        color: var(--text-2); cursor: pointer; position: relative; white-space: nowrap;
        transition: background var(--t-micro) var(--ease), color var(--t-micro) var(--ease); }
    .rail-item:hover { background: rgba(255,255,255,0.04); color: var(--text-1); }
    .rail-item.active { background: rgba(255,255,255,0.06); color: var(--text-1); }
    .rail-item.active::before { content: ""; position: absolute; left: -12px; top: 8px; bottom: 8px; width: 3px; border-radius: 0 3px 3px 0; background: var(--accent); }
    .rail-item .ico { width: 20px; height: 20px; flex: 0 0 auto; display: grid; place-items: center; }
    .rail-item .ico svg { width: 20px; height: 20px; }
    .rail-item .rail-label { font: var(--fw-label) var(--fs-body)/1 var(--font); flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .rail-item .rail-roll { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
    .rail[data-collapsed="true"] .rail-item { justify-content: center; padding: 0; }
    .rail[data-collapsed="true"] .rail-nav { align-items: center; }
    .rail-foot { display: flex; flex-direction: column; gap: 2px; }
    .rail-foot .rail-item.sep { margin-top: var(--s-2); border-top: 1px solid var(--line-1); border-radius: 0 0 var(--r-input) var(--r-input); padding-top: var(--s-3); }

    /* ── Topbar (contextual) ── */
    .topbar { grid-area: topbar; height: 52px; display: flex; align-items: center; gap: var(--s-4); padding: 0 var(--s-6);
        background: var(--bg-0); border-bottom: 1px solid var(--line-1); }
    .topbar-crumb { font: var(--fw-h2) var(--fs-h2)/1 var(--font); color: var(--text-1); letter-spacing: -0.01em; }
    .topbar-crumb .crumb-sub { font: var(--fw-body) var(--fs-cap) var(--font); color: var(--text-3); margin-left: var(--s-3); }
    .verdict-pill { display: inline-flex; align-items: center; gap: var(--s-2); height: 30px; padding: 0 var(--s-3) 0 var(--s-3);
        border: 0; border-radius: var(--r-pill); background: var(--healthy-tint); color: var(--healthy); cursor: pointer;
        font: var(--fw-label) var(--fs-cap) var(--font); transition: background var(--t-card) var(--ease), color var(--t-card) var(--ease); }
    .verdict-pill[data-s="warning"] { background: var(--warning-tint); color: var(--warning); }
    .verdict-pill[data-s="critical"] { background: var(--critical-tint); color: var(--critical); }
    .verdict-pill[data-s="offline"] { background: var(--offline-tint); color: var(--offline); }
    .verdict-pill .vdot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: var(--s-2); }
    .cmdk-hint { display: inline-flex; align-items: center; gap: var(--s-2); height: 32px; padding: 0 var(--s-2) 0 var(--s-3);
        background: var(--bg-1); border: 1px solid var(--line-1); border-radius: var(--r-input); color: var(--text-3); cursor: pointer;
        font: var(--fw-body) var(--fs-cap) var(--font); transition: border-color var(--t-micro) var(--ease), color var(--t-micro) var(--ease); }
    .cmdk-hint:hover { border-color: var(--line-2); color: var(--text-2); }
    .cmdk-hint svg { width: 15px; height: 15px; }
    .cmdk-hint kbd { font: 500 11px var(--mono); padding: 1px 5px; border-radius: 5px; background: rgba(255,255,255,0.06); color: var(--text-2); }
    .ico-btn { position: relative; width: 34px; height: 34px; display: grid; place-items: center; background: transparent; border: 0;
        border-radius: var(--r-input); color: var(--text-2); cursor: pointer; transition: background var(--t-micro) var(--ease), color var(--t-micro) var(--ease); }
    .ico-btn:hover { background: var(--bg-1); color: var(--text-1); }
    .ico-btn svg { width: 18px; height: 18px; }
    .ico-btn .spin { animation: hl-spin .7s linear; }
    @keyframes hl-spin { to { transform: rotate(360deg); } }
    .notif-dot { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--warning); display: none; box-shadow: 0 0 0 2px var(--bg-0); }
    .notif-dot.crit { background: var(--critical); }
    .notif-dot.show { display: block; }
    
    .accent-dot { width: 16px; height: 16px; border-radius: 50%; border: 0; cursor: pointer; padding: 0; opacity: .5; transition: opacity var(--t-micro) var(--ease), transform var(--t-micro) var(--ease); }
    .accent-dot:hover { opacity: 1; transform: scale(1.12); }
    .accent-dot.on { opacity: 1; box-shadow: 0 0 0 2px var(--bg-0), 0 0 0 3px currentColor; }

    /* ── View + scroll ── */
    .view { grid-area: view; overflow: auto; padding: var(--s-6); min-height: 0; }
    .view-inner { max-width: 1760px; margin: 0 auto; }   /* keep charts/rows from stretching on ultrawide */
    @media (min-width: 2400px) { .view-inner { max-width: 1900px; } }
    .app ::-webkit-scrollbar { width: 10px; height: 10px; }
    .app ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    .app ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); background-clip: padding-box; }

    /* ── Card primitive ── */
    .card { background: var(--bg-1); border-radius: var(--r-card); box-shadow: var(--sh-1); padding: var(--s-5); position: relative; border: 0;
        transition: box-shadow var(--t-card) var(--ease), background var(--t-card) var(--ease), transform var(--t-card) var(--ease); }
    .card::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 1px; background: var(--line-top); border-radius: var(--r-card) var(--r-card) 0 0; pointer-events: none; }
    .card.is-interactive { cursor: pointer; }
    .card.is-interactive:hover { background: var(--s1); }
    .card[data-state="warning"] { box-shadow: inset 2px 0 0 var(--warn); }
    .card[data-state="critical"] { box-shadow: inset 2px 0 0 var(--crit); }
    .card[data-state="offline"] { opacity: 0.9; }

    /* ── Status pill (4-state, icon+label, survives grayscale via dot shape) ── */
    .pill { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: var(--r-pill); font: 500 12px var(--font); }
    .pill .dot { width: 8px; height: 8px; flex: none; border-radius: 50%; background: currentColor; }
    .pill[data-s="healthy"] { color: var(--healthy); background: var(--healthy-tint); }
    .pill[data-s="warning"] { color: var(--warning); background: var(--warning-tint); }
    .pill[data-s="warning"] .dot { background: transparent; border: 2px solid currentColor; width: 10px; height: 10px; }
    .pill[data-s="critical"] { color: var(--critical); background: var(--critical-tint); }
    .pill[data-s="critical"] .dot { border-radius: 1px; clip-path: polygon(50% 0, 100% 100%, 0 100%); }
    .pill[data-s="offline"] { color: var(--offline); background: var(--offline-tint); }
    .pill[data-s="offline"] .dot { background: transparent; border: 2px solid currentColor; border-radius: 2px; width: 9px; height: 9px; }

    /* ── Segmented control ── */
    .seg { display: inline-flex; gap: 2px; padding: 2px; background: var(--bg-1); border-radius: var(--r-input); box-shadow: var(--sh-0); }
    .seg button { height: 26px; padding: 0 11px; border: 0; background: transparent; color: var(--text-2); font: 500 12px var(--font);
        border-radius: 8px; cursor: pointer; transition: background var(--t-micro) var(--ease), color var(--t-micro) var(--ease); }
    .seg button:hover { color: var(--text-1); }
    .seg button[aria-pressed="true"] { background: var(--bg-2); color: var(--text-1); box-shadow: var(--sh-0); }
    .seg button.live[aria-pressed="true"] { color: var(--accent); }

    /* ── Meter ── */
    .meter { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
    
    .meter-fill.warn { background: var(--warning); } .meter-fill.bad { background: var(--critical); }

    /* ── Badge ── */
    .badge { display: inline-flex; align-items: center; gap: 4px; height: 20px; padding: 0 8px; border-radius: var(--r-chip);
        font: 500 11px var(--font); background: var(--bg-2); color: var(--text-2); }
    .badge.count { background: rgba(255,255,255,0.06); min-width: 20px; justify-content: center; }
    .badge.warn { color: var(--warning); background: var(--warning-tint); }
    .badge.crit { color: var(--critical); background: var(--critical-tint); }

    /* ── Skeleton ── */
    .skel { background: linear-gradient(100deg, var(--bg-1) 30%, var(--bg-2) 50%, var(--bg-1) 70%); background-size: 200% 100%;
        animation: shimmer var(--skeleton-shimmer) linear infinite; border-radius: 6px; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    /* ── Data list ── */

    .dlist-name img, .dlist-name .ico { width: 16px; height: 16px; border-radius: 4px; flex: 0 0 auto; }

    /* ── Blankslate / empty ── */
    .blankslate { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--s-2); text-align: center;
        padding: var(--s-10) var(--s-6); color: var(--text-2); min-height: 160px; }
    .blankslate .bs-ico { width: 40px; height: 40px; color: var(--text-3); margin-bottom: var(--s-1); }
    .blankslate.ok .bs-ico { color: var(--healthy); }
    .blankslate .bs-title { font: var(--fw-h2) var(--fs-body) var(--font); color: var(--text-1); }
    .blankslate .bs-sub { font: var(--fw-body) var(--fs-cap) var(--font); color: var(--text-3); }
    .blankslate .bs-act { margin-top: var(--s-3); }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: var(--s-2); height: 34px; padding: 0 var(--s-4); border-radius: var(--r-input);
        background: var(--bg-2); color: var(--text-1); border: 0; font: var(--fw-label) var(--fs-body) var(--font); cursor: pointer;
        transition: background var(--t-micro) var(--ease), transform var(--t-micro) var(--ease); }
    .btn:hover { background: var(--bg-3); }
    .btn.primary { background: var(--accent); color: #06231f; }
    .btn.primary:hover { background: var(--accent-2); }
    .btn.ghost { background: transparent; color: var(--text-2); }
    .btn.ghost:hover { background: var(--bg-1); color: var(--text-1); }
    .btn svg { width: 16px; height: 16px; }

    /* ── Chart card ── */

    .chart-value .unit, .chart-value .text-3 { font-size: 15px; color: var(--text-3); font-weight: 500; }
    .chart-value.warn { color: var(--warning); } .chart-value.bad { color: var(--critical); }

    .chart-plot { position: relative; min-height: 84px; }
    .chart-plot .spark { width: 100%; height: 100%; display: block; }
    .chart-plot[data-chart] { cursor: crosshair; }
    .chart-cross { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--crosshair); opacity: 0; pointer-events: none; transition: opacity .1s var(--ease); }
    .chart-dot { position: absolute; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 2px var(--bg-1); transform: translate(-50%, -50%); opacity: 0; pointer-events: none; transition: opacity .1s var(--ease); }
    .chart-tip { position: absolute; top: 0; transform: translate(-50%, calc(-100% - 10px)); background: var(--bg-3); box-shadow: var(--sh-3); border-radius: 10px; padding: 5px 10px; font: 600 13px var(--mono); color: var(--text-1); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .1s var(--ease); z-index: 6; }
    .chart-tip .tip-t { color: var(--text-3); font: 450 11px var(--font); margin-left: 7px; }
    .chart-plot.on .chart-cross, .chart-plot.on .chart-dot, .chart-plot.on .chart-tip { opacity: 1; }

    /* ── Home page bands ── */
    .home { display: flex; flex-direction: column; gap: var(--s-6); }

    .hero-counter .kc-val .unit { font-size: 13px; color: var(--text-3); }

    .hb-head img, .hb-head .ico { width: 16px; height: 16px; border-radius: 4px; }

    .floor-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: var(--s-4); }
    .floor-head .chart-title { font-size: var(--fs-body); }
    .qa-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px,1fr)); gap: var(--s-3); }
    .qa-tile { display: flex; flex-direction: column; align-items: center; gap: var(--s-2); padding: var(--s-3) var(--s-2); border-radius: var(--r-input);
        background: var(--bg-2); color: var(--text-2); text-align: center; cursor: pointer; transition: background var(--t-micro) var(--ease), color var(--t-micro) var(--ease), transform var(--t-micro) var(--ease); }
    .qa-tile:hover { background: var(--s2); color: var(--t1); }
    .qa-tile img, .qa-tile .ico { width: 28px; height: 28px; border-radius: 7px; }
    .qa-tile .qa-name { font: var(--fw-body) 11px var(--font); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    
    .act-row .ts { font: 450 12px var(--mono); color: var(--text-3); }
    .act-msg { color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .act-msg b { color: var(--text-1); font-weight: 600; }

    /* ── Home v2: compact resource KPIs + services board + triage ── */
    .panel-title { font: 600 var(--fs-body) var(--font); color: var(--text-1); }

    .kpi-card .kpi-val.warn { color: var(--warning); } .kpi-card .kpi-val.bad { color: var(--critical); }
    .kpi-card .kpi-val .unit { font-size: 14px; color: var(--text-3); margin-left: 1px; font-weight: 500; }

    .kpi-card .kpi-spark .spark { width: 100%; height: 100%; display: block; }
    .kpi-card .pill { height: 19px; padding: 0 7px; font-size: 11px; }

    .svc-chip-top img, .svc-chip-top .ico { width: 18px; height: 18px; border-radius: 5px; flex: 0 0 auto; }

    .svc-chip .up-strip { flex: 1; }
    @media (max-width: 1240px) {  }
    @media (max-width: 1100px) {  }
    @media (max-width: 560px) {  }

    /* ── Hardware: chart-led performance ── */

    .hw-temp-val.warn { color: var(--warning); } .hw-temp-val.bad { color: var(--critical); }
    @media (max-width: 1100px) {   }
    @media (max-width: 560px) {  }

    /* ── Storage: free-space-first ── */
    .storage { display: flex; flex-direction: column; gap: var(--s-4); }

    .stor-bar-fill.warn { background: var(--warning); } .stor-bar-fill.bad { background: var(--critical); }

    .stor-flag-v.warn { color: var(--warning); } .stor-flag-v.bad { color: var(--critical); }

    .stor-pool-pct.warn { color: var(--warning); } .stor-pool-pct.bad { color: var(--critical); }

    @media (max-width: 900px) {  }

    /* ── Containers: attention-first row list ── */
    
    .ctr-head .seg button { display: inline-flex; align-items: center; gap: 6px; }
    .ctr-head .seg .seg-n { font: 500 11px var(--mono); padding: 1px 6px; border-radius: 999px; background: rgba(255,255,255,0.07); color: inherit; }

    .ctr-list { display: flex; flex-direction: column; }
    .ctr-row { display: grid; grid-template-columns: 18px minmax(0, 1.8fr) 78px 150px auto; align-items: center; gap: var(--s-4); min-height: 52px; padding: 0 var(--s-3); border-radius: var(--r-input); transition: background var(--t-micro) var(--ease); }
    .ctr-row + .ctr-row { box-shadow: inset 0 1px 0 var(--line-1); }
    .ctr-row:hover { background: var(--bg-2); box-shadow: none; }
    .ctr-row.is-sel { background: var(--bg-2); box-shadow: inset 2px 0 0 var(--accent); }
    .ctr-row.is-stopped .ctr-name, .ctr-row.is-stopped .ctr-img { opacity: .6; }
    
    .ctr-name-block img, .ctr-name-block .ico { width: 24px; height: 24px; border-radius: 6px; flex: 0 0 auto; }
    .ctr-name { font: 500 var(--fs-body) var(--font); color: var(--text-1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ctr-img { font: 450 11px var(--mono); color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .ctr-cpu .v { font: 600 14px var(--mono); color: var(--text-1); display: block; }
    .ctr-cpu .v.warn { color: var(--warning); } .ctr-cpu .v.bad { color: var(--critical); }

    .ctr-row:hover .ctr-acts { opacity: 1; }
    .ctr-act { width: 28px; height: 28px; display: grid; place-items: center; border: 0; border-radius: var(--r-chip); background: transparent; color: var(--text-3); cursor: pointer; transition: background var(--t-micro) var(--ease), color var(--t-micro) var(--ease); }
    .ctr-act:hover:not(:disabled) { background: var(--bg-3); color: var(--text-1); }
    .ctr-act.danger:hover:not(:disabled) { color: var(--critical); }
    .ctr-act:disabled { opacity: .28; cursor: default; }
    .ctr-act svg { width: 15px; height: 15px; }

    @media (max-width: 760px) { .ctr-row { grid-template-columns: 18px 1fr auto; }   }
    .apps { display: flex; flex-direction: column; gap: var(--s-4); }

    /* ── Networking: topology + unified client list ── */
    .net { display: flex; flex-direction: column; gap: var(--s-4); }
    .net .kpi-row { grid-template-columns: repeat(3, 1fr); }

    .net-cli-glyph.wifi { color: var(--accent); } .net-cli-glyph.wired { color: var(--blue); }

    .org .tnode { background: var(--bg-2); border: 0; border-radius: var(--r-input); padding: var(--s-3); min-width: 120px; box-shadow: none; }
    .org .tnode.off { opacity: .5; }
    .org .tnode-name { font: 500 var(--fs-cap) var(--font); color: var(--text-1); }
    .org .tnode-meta { font: 450 11px var(--font); color: var(--text-3); margin-top: 3px; }
    .org .tnode-stat { font: 450 11px var(--font); color: var(--text-3); margin-top: 4px; }
    @media (max-width: 900px) { .net .kpi-row { grid-template-columns: 1fr; } }
    @media (max-width: 760px) {   }

    /* ── Bottom activity dock ── */
    .dock { grid-area: dock; height: 38px; background: var(--bg-1); box-shadow: 0 -1px 2px rgba(0,0,0,0.3); overflow: hidden;
        transition: height var(--t-view) var(--ease); display: flex; flex-direction: column; }
    .dock[data-open="true"] { height: 224px; }
    
    .dock-bar .eyebrow { color: var(--text-2); }
    
    .dock[data-open="true"] .dock-chev { transform: rotate(180deg); }
    
    .dock-row { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: var(--s-3); height: 30px; font: 450 13px var(--font); color: var(--text-2); }
    .dock-row .ts { font: 450 12px var(--mono); color: var(--text-3); }

    .view .page-head { margin-bottom: var(--s-5); }
    
    @keyframes pulseCrit { 0% { box-shadow: 0 0 0 0 var(--critical-tint); } 70% { box-shadow: 0 0 0 10px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: .001ms !important; transition-duration: .001ms !important; } }

    /* ── Responsive ── */
    @media (max-width: 1600px) {   }
    @media (max-width: 1100px) {    }
    @media (max-width: 880px) {
        .app { grid-template-columns: 1fr; grid-template-areas: "topbar" "view" "dock"; }
        .rail { display: none; }
        .topbar { padding: 0 var(--s-4); }
        .cmdk-hint span, .cmdk-hint kbd { display: none; }
        .cmdk-hint { width: 34px; padding: 0; justify-content: center; }

        .view { padding: var(--s-4); }
    }
    @media (max-width: 640px) {
        .topbar { gap: var(--s-2); padding: 0 var(--s-3); }
        .topbar-crumb .crumb-sub { display: none; }
        
        .verdict-pill { padding: 0 9px; }
        .verdict-pill #verdictText { display: none; }
    }

    /* ═══════════════════════════════════════════════════════════════════════
       GAUGE — instrument-bus system. Appended last so it wins the cascade.
       Structure = lanes + hairlines. Elevation + saturated color are rationed.
       ═══════════════════════════════════════════════════════════════════════ */
    /* — type + utility primitives — */
    .eyebrow { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); }
    .mono { font-family: var(--mono); font-feature-settings: var(--tnum); }
    .tnum { font-feature-settings: var(--tnum); }
    .lbl { font: var(--f-lbl); color: var(--t3); }
    hr.hair, .hair { border: 0; border-top: 1px solid var(--hair); margin: 0; height: 0; width: 100%; }
    /* solid status dots — no glow */
    .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; display: inline-block; background: var(--idle); box-shadow: none; }
    .dot.ok, .dot.good, .dot.healthy { background: var(--ok); box-shadow: none; }
    .dot.warn, .dot.warning { background: var(--warn); box-shadow: none; }
    .dot.crit, .dot.bad, .dot.critical { background: var(--crit); box-shadow: none; }
    .dot.idle, .dot.offline { background: var(--idle); box-shadow: none; }
    .dot.live { background: var(--live); box-shadow: none; }
    .status-chip { display: inline-flex; align-items: center; gap: 6px; font: var(--f-lbl); color: var(--t2); white-space: nowrap; }
    .status-chip b { color: var(--t1); font-weight: 560; font-family: var(--mono); font-feature-settings: var(--tnum); }
    .status-chip[data-state=ok] .dot { background: var(--ok); } .status-chip[data-state=warn] .dot { background: var(--warn); } .status-chip[data-state=crit] .dot { background: var(--crit); } .status-chip[data-state=idle] .dot { background: var(--idle); }
    .gchip { display: inline-flex; align-items: center; gap: 6px; height: 22px; padding: 0 9px; border-radius: var(--r-pill); border: 1px solid var(--hair); background: var(--s1); color: var(--t2); font: var(--f-lbl); }
    .gchip .mono { color: var(--t1); }
    .g-skel { background: linear-gradient(100deg, var(--s1) 28%, var(--s2) 50%, var(--s1) 72%); background-size: 200% 100%; animation: shimmer var(--skeleton-shimmer) linear infinite; border-radius: 6px; display: block; }

    /* — shell overrides: slim 60px icon rail, 44px flat topbar, full-bleed view — */
    .app { grid-template-columns: 60px 1fr; }
    .rail { background: var(--bg); border-right: 1px solid var(--hair); padding: 10px 0; gap: 2px; }
    .rail[data-collapsed] { width: auto; }
    .rail-wordmark, .rail-collapse { display: none !important; }
    .rail-brand { justify-content: center; padding: 2px 0 10px; margin: 0; border: 0; }
    .rail-logo { color: var(--t2); background: none; box-shadow: none; width: 30px; height: 30px; }
    .rail-logo svg { width: 22px; height: 22px; }
    .rail-nav { padding: 4px 0; gap: 3px; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .rail-sect { display: none; }
    .rail-nav::before, .rail-foot::before { content: ""; display: block; width: 22px; height: 1px; background: var(--hair); margin: 5px auto; }
    .rail-item { width: 40px; height: 40px; border-radius: var(--r-well); color: var(--t3); display: flex; align-items: center; justify-content: center; position: relative; transition: color var(--t), background var(--t); }
    .rail-item .rail-label { display: none; }
    .rail-item .ico svg, .rail-item svg { width: 19px; height: 19px; }
    .rail-item:hover { color: var(--t1); background: var(--s1); }
    .rail-item.active { color: var(--live); background: var(--live-wash); box-shadow: none; }
    .rail-item.active::before { content: ""; position: absolute; left: -10px; top: 9px; bottom: 9px; width: 2px; border-radius: 2px; background: var(--live); }
    .rail-roll { position: absolute; top: 7px; right: 7px; width: 6px; height: 6px; border-radius: 50%; }
    .rail-foot { width: 100%; display: flex; flex-direction: column; align-items: center; }

    .topbar { height: 44px; min-height: 44px; padding: 0 16px; gap: 12px; background: var(--bg); border-bottom: 1px solid var(--hair); -webkit-backdrop-filter: none; backdrop-filter: none; }
    .topbar-crumb { font: var(--f-h); letter-spacing: var(--f-h-tr); color: var(--t1); display: flex; align-items: baseline; gap: 9px; }
    .topbar-crumb .crumb-sub { font: var(--f-lbl); color: var(--t3); text-transform: none; letter-spacing: 0; }
    .verdict-pill { height: 26px; padding: 0 10px; gap: 7px; border-radius: var(--r-pill); border: 1px solid var(--hair); background: var(--s1); color: var(--t2); font: var(--f-lbl); display: inline-flex; align-items: center; }
    .verdict-pill .vdot { width: 7px; height: 7px; border-radius: 50%; background: var(--idle); }
    .verdict-pill[data-s=healthy] .vdot { background: var(--ok); } .verdict-pill[data-s=warning] .vdot { background: var(--warn); } .verdict-pill[data-s=critical] .vdot { background: var(--crit); animation: tipPulse 1.4s ease-in-out infinite; } .verdict-pill[data-s=offline] .vdot { background: var(--idle); }
    .verdict-pill[data-s=healthy] { color: var(--t2); } .verdict-pill[data-s=critical], .verdict-pill[data-s=warning] { color: var(--t1); border-color: var(--hair-2); }
    .topbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
    /* connection mode — teal dot only while the SSE stream is actually live */
    .conn-badge { display: inline-flex; align-items: center; gap: 6px; font: var(--f-lbl); color: var(--t3); padding-right: 2px; }
    .conn-badge .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--idle); }
    .conn-badge[data-mode="live"] .conn-dot { background: var(--live); animation: livePulse 2.4s ease-in-out infinite; }
    .cmdk-hint { height: 30px; padding: 0 10px; gap: 8px; border-radius: var(--r-well); border: 1px solid var(--hair); background: var(--s0); color: var(--t3); font: var(--f-lbl); display: inline-flex; align-items: center; }
    .cmdk-hint:hover { color: var(--t1); border-color: var(--hair-2); }
    .cmdk-hint svg { width: 14px; height: 14px; }
    .cmdk-hint kbd { font-family: var(--mono); font-size: 10px; color: var(--t3); border: 1px solid var(--hair); border-radius: 4px; padding: 1px 5px; }
    .ico-btn { width: 30px; height: 30px; border-radius: var(--r-well); border: 1px solid var(--hair); background: var(--s0); color: var(--t3); display: inline-flex; align-items: center; justify-content: center; }
    .ico-btn:hover { color: var(--t1); border-color: var(--hair-2); }
    .ico-btn svg { width: 16px; height: 16px; }
    .view { padding: 0; background: var(--bg); }
    .view-inner { max-width: 1760px; margin: 0 auto; padding: 18px 22px 72px; width: 100%; }
    @media (min-width: 1900px) { .view-inner { max-width: 1860px; } }

    /* — lane: the flat workhorse container (replaces .card). NOT raised. — */
    .lane { background: var(--s0); border: 1px solid var(--hair); border-radius: var(--r); margin-bottom: 12px; overflow: hidden; }
    .lane-head, .lane__head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 9px 14px 8px; }
    .lane-head .eyebrow, .lane__head .eyebrow, .lane__eye { color: var(--t3); }
    .lane-meta, .lane__meta { font: var(--f-lbl); color: var(--t3); font-family: var(--mono); font-feature-settings: var(--tnum); display: inline-flex; align-items: center; gap: 10px; }
    .lane-body { padding: 4px 14px 12px; }
    .lane[data-state=warn] { box-shadow: inset 2px 0 0 var(--warn); background: linear-gradient(90deg, var(--warn-wash), transparent 40%), var(--s0); }
    .lane[data-state=crit] { box-shadow: inset 2px 0 0 var(--crit); background: linear-gradient(90deg, var(--crit-wash), transparent 40%), var(--s0); }
    .lane[data-state=ok] { box-shadow: inset 2px 0 0 var(--ok); }

    /* — instrument: the ONE raised element per view (scarcity is the point) — */
    .instrument { background: var(--s1); border: 1px solid var(--hair-2); border-radius: var(--r); box-shadow: var(--sh); margin-bottom: 14px; overflow: hidden; }
    .instr-head, .instrument > .lane-head { padding: 10px 16px 9px; }

    /* — stripWall: the vitals bus (replaces the four-up KPI grid) — */
    .stripwall { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); column-gap: 26px; padding: 2px 14px 10px; }
    .strip { display: flex; align-items: center; gap: 10px; height: 32px; border-bottom: 1px solid var(--hair); min-width: 0; }
    .strip__label { width: 74px; flex: 0 0 auto; font: var(--f-lbl); color: var(--t3); text-transform: uppercase; letter-spacing: .05em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .strip__spark { flex: 1 1 auto; min-width: 30px; height: 22px; display: flex; align-items: center; }
    .strip__spark .spark { width: 100%; height: 22px; display: block; }
    .strip__val { flex: 0 0 auto; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 12.5px; font-weight: 560; color: var(--t1); min-width: 40px; text-align: right; }
    .strip__delta { flex: 0 0 auto; width: 32px; text-align: right; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 10.5px; color: var(--t4); }
    .strip__delta.up { color: var(--t3); } .strip__delta.dn { color: var(--t3); }
    .strip[data-state=warn] .strip__val { color: var(--warn-ink); } .strip[data-state=crit] .strip__val { color: var(--crit-ink); }
    .strip.is-warming { color: var(--t4); } .strip.is-warming .strip__stub { flex: 1 1 auto; font: var(--f-lbl); color: var(--t4); }

    /* — statusRibbon / trend ribbon — */
    .ribbon { display: inline-flex; gap: 1.5px; height: 15px; align-items: flex-end; flex: 0 0 auto; }
    .ribbon i { width: 3px; border-radius: 1px; background: var(--idle); display: block; opacity: .55; }
    .ribbon i.ok { background: var(--ok); } .ribbon i.slow { background: var(--warn); } .ribbon i.down { background: var(--crit); opacity: .8; }

    /* — Home: the attention horizon (the only raised instrument on the page) — */
    .horizon { display: flex; gap: 22px; padding: 18px 20px; align-items: stretch; }
    .horizon__verdict { flex: 0 0 208px; display: flex; flex-direction: column; justify-content: center; gap: 3px; border-right: 1px solid var(--hair); padding-right: 20px; }
    .horizon__dot { width: 9px; height: 9px; border-radius: 50%; background: var(--idle); margin-bottom: 4px; }
    .horizon__figure { font: var(--f-hero); font-family: var(--mono); font-feature-settings: var(--tnum); letter-spacing: var(--f-hero-tr); color: var(--t1); line-height: 1; }
    .horizon__word { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t2); margin-top: 6px; }
    .horizon__sub { font: var(--f-lbl); color: var(--t3); }
    .horizon[data-state=critical] .horizon__figure, .horizon[data-state=critical] .horizon__dot { color: var(--crit); background: var(--crit); }
    .horizon[data-state=critical] .horizon__figure { background: none; color: var(--crit); }
    .horizon[data-state=warning] .horizon__figure { color: var(--warn); } .horizon[data-state=warning] .horizon__dot { background: var(--warn); }
    .horizon[data-state=healthy] .horizon__figure { color: var(--ok); } .horizon[data-state=healthy] .horizon__dot { background: var(--ok); }
    .horizon[data-state=offline] .horizon__figure { color: var(--idle); font-size: 22px; } .horizon[data-state=offline] .horizon__dot { background: var(--idle); }
    .horizon__list { flex: 1 1 auto; display: flex; flex-direction: column; min-width: 0; }
    .attn-row { display: flex; align-items: center; gap: 12px; padding: 8px 2px; border-top: 1px solid var(--hair); cursor: pointer; transition: background var(--t); }
    .attn-row:first-child { border-top: 0; }
    .attn-row:hover { background: var(--s2); }
    .attn-row .dot { width: 8px; height: 8px; }
    .attn-row__name { font: var(--f-h); color: var(--t1); flex: 0 0 auto; }
    .attn-row__reason { font: var(--f-lbl); color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attn-row .ribbon { margin-left: auto; }
    .attn-row__chevron { color: var(--t4); font-size: 15px; flex: 0 0 auto; }
    .horizon__calm { display: flex; align-items: center; gap: 12px; flex: 1 1 auto; }
    .horizon__calm .ok-glyph { color: var(--ok); }
    .horizon__calm-txt { font: var(--f-read); color: var(--t1); } .horizon__calm-sub { font: var(--f-lbl); color: var(--t3); }

    /* — serviceLane: Grafana-style state timeline (Home + Apps) — */
    .svc-group { margin-top: 4px; }
    .svc-group__label { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); padding: 12px 2px 3px; }
    .serviceLane { display: flex; align-items: center; gap: 12px; height: 34px; border-top: 1px solid var(--hair); }
    .serviceLane:first-of-type { border-top: 0; }
    .serviceLane__name { width: 156px; flex: 0 0 auto; font: var(--f-row); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
    .serviceLane__name .dot { width: 7px; height: 7px; }
    .timeline { flex: 1 1 auto; display: flex; height: 9px; border-radius: 3px; overflow: hidden; gap: 1px; background: var(--s2); min-width: 40px; }
    .tl-seg { display: block; height: 100%; background: var(--idle); }
    .tl-seg.is-ok { background: var(--ok); } .tl-seg.is-slow { background: var(--warn); } .tl-seg.is-down { background: var(--crit); } .tl-seg.is-idle { background: var(--idle); opacity: .5; }
    .serviceLane__spark { width: 84px; height: 22px; flex: 0 0 auto; }
    .serviceLane__spark .spark { width: 100%; height: 22px; }
    .serviceLane__ms { width: 56px; flex: 0 0 auto; text-align: right; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11.5px; color: var(--t2); }
    .serviceLane[data-state=critical] .serviceLane__ms { color: var(--crit-ink); } .serviceLane[data-state=warning] .serviceLane__ms { color: var(--warn-ink); }

    /* — home footer metadata — */
    .home-foot { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; padding: 16px 4px 0; color: var(--t3); font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11px; }
    .home-foot .foot-sep { color: var(--t4); }

    @keyframes tipPulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
    @media (prefers-reduced-motion: reduce) { .verdict-pill .vdot, .live-tip, .tip-pulse { animation: none !important; } }

    /* — responsive: Home horizon stacks; stripwall goes single-column — */
    @media (max-width: 900px) {
        .horizon { flex-direction: column; gap: 14px; }
        .horizon__verdict { flex: none; border-right: 0; border-bottom: 1px solid var(--hair); padding-right: 0; padding-bottom: 12px; flex-direction: row; align-items: baseline; gap: 12px; }
        .stripwall { grid-template-columns: 1fr; column-gap: 0; }
        .serviceLane__spark { display: none; }
    }

    /* — Overview: the Mission-Control command deck — */
    .deck-scope { font: var(--f-lbl); color: var(--t3); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--hair); }
    .deck-scope b { color: var(--t1); font-family: var(--mono); font-feature-settings: var(--tnum); }
    .deck-glance { display: flex; gap: 8px; flex-wrap: wrap; align-content: center; align-items: center; }
    .glance-chip { display: inline-flex; align-items: center; gap: 7px; height: 27px; padding: 0 12px; border-radius: var(--r-pill); border: 1px solid var(--hair); background: var(--s2); font: var(--f-lbl); color: var(--t2); }
    .glance-chip .dot { width: 6px; height: 6px; }
    .glance-chip b { color: var(--t1); font-family: var(--mono); font-feature-settings: var(--tnum); }
    .deck-live-grid { display: grid; grid-template-columns: minmax(0, 1fr) 320px; }
    .deck-live-grid > div { padding: 8px 14px 12px; min-width: 0; }
    .deck-streams { border-right: 1px solid var(--hair); }
    .deck-stream { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-top: 1px solid var(--hair); }
    .deck-stream:first-child { border-top: 0; }
    .stream-poster.sm { width: 34px; height: 50px; border-radius: 4px; }
