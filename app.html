<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homelab Command Center</title>
<style>
/* Self-hosted variable fonts (latin subset) — first paint never waits on a font CDN. */
@font-face { font-family: 'Inter'; font-style: normal; font-weight: 100 900; font-display: swap; src: url(/fonts/inter-var.woff2) format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 100 900; font-display: swap; src: url(/fonts/geist-mono-var.woff2) format('woff2'); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
</style>
<style>
    :root {
        /* ══ GAUGE — instrument-bus design system. Structure = lanes + hairlines. Color = state only. ══ */
        /* Surface ramp — matte near-black, 5 tiers with real jobs. Only ONE element per view is raised to --s1. */
        --bg:#07090A;   --s0:#0C0F11;  --s1:#12171A;  --s2:#182024;  --s3:#1F292E;
        --hair:rgba(255,255,255,0.055); --hair-2:rgba(255,255,255,0.10);
        /* Text — alpha ramp on near-black */
        --t1:rgba(237,242,244,0.95); --t2:rgba(237,242,244,0.68); --t3:rgba(237,242,244,0.55); --t4:rgba(237,242,244,0.40);
        /* Accent — teal, ONLY on live/active pixels. Status — saturated, ONLY on state-carrying pixels. */
        --live:#2DD4BF;
        --ok:#34D399; --warn:#F5B547; --crit:#F26D6D; --idle:#7C8A91; --info:#5AB6E8;
        --ok-ink:#6EE7B7; --warn-ink:#FCD489; --crit-ink:#F8A0A0;
        --ok-wash:rgba(52,211,153,0.08); --warn-wash:rgba(245,181,71,0.10); --crit-wash:rgba(242,109,109,0.10); --live-wash:rgba(45,212,191,0.09); --idle-wash:rgba(124,138,145,0.08);
        --grid-line:rgba(255,255,255,0.04); --crosshair:rgba(255,255,255,0.20);
        /* Type — one hero figure per view; everything else subordinate. Mono + tnum on every value. */
        --font:'Inter',-apple-system,'SF Pro Text',system-ui,sans-serif;
        --mono:'Geist Mono','SF Mono','JetBrains Mono',ui-monospace,monospace;
        --tnum:"tnum" 1,"cv11" 1;
        --f-hero:560 34px/36px var(--font); --f-hero-tr:-0.02em;
        --f-read:560 19px/22px var(--font);
        --f-h:600 13px/16px var(--font);   --f-h-tr:-0.005em;
        --f-row:480 12.5px/16px var(--font);
        --f-lbl:500 11px/14px var(--font);
        --f-eye:620 10px/12px var(--font);  --f-eye-tr:0.09em;
        /* Spacing — tight 4px base on a strict 28px baseline grid */
        --sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:24px;--sp-6:32px; --row:28px;
        /* Radius + a two-step shadow ladder (no glows) */
        --r:10px; --r-well:8px; --r-pill:999px;
        --sh:0 1px 2px rgba(0,0,0,0.40);
        --sh-pop:0 12px 32px rgba(0,0,0,0.50);
        /* Motion — reserved, in-place */
        --ease:cubic-bezier(0.2,0,0,1); --t:120ms var(--ease); --t-2:180ms var(--ease);
        --skeleton-shimmer:1400ms;
        /* ── transition aliases: legacy Slate var names remap onto GAUGE so un-rebuilt pages inherit the new palette ── */
        --bg-0:var(--bg); --bg-1:var(--s0); --bg-2:var(--s1); --bg-3:var(--s2); --bg-4:var(--s3);
        --sidebar:var(--bg); --card:var(--s0); --card-2:var(--s1); --scrim:rgba(3,5,6,0.66);
        --line-1:var(--hair); --line-2:var(--hair-2); --line-top:var(--hair-2); --border:var(--hair-2); --border-soft:var(--hair);
        --text-1:var(--t1); --text-2:var(--t2); --text-3:var(--t3); --text-4:var(--t4);
        --text:var(--t1); --muted:var(--t2); --faint:var(--t3);
        --healthy:var(--ok); --warning:var(--warn); --critical:var(--crit); --offline:var(--idle);
        --accent:var(--live); --accent-2:var(--live);
        --green:var(--ok); --red:var(--crit); --yellow:var(--warn); --orange:#F5B547; --blue:var(--info); --purple:#A78BFA;
        --healthy-tint:var(--ok-wash); --warning-tint:var(--warn-wash); --critical-tint:var(--crit-wash); --offline-tint:var(--idle-wash);
        --healthy-wash:var(--ok-wash); --warning-wash:var(--warn-wash); --critical-wash:var(--crit-wash);
        --accent-fill:var(--live-wash);
        --sh-0:var(--sh); --sh-1:var(--sh); --sh-2:var(--sh); --sh-3:var(--sh-pop);
        --glow-healthy:var(--sh); --glow-warning:var(--sh); --glow-critical:var(--sh);
        --shadow:var(--sh); --radius:var(--r);
        --ease-soft:var(--ease); --t-micro:120ms; --t-card:180ms; --t-view:200ms;
        --fs-display:32px;--lh-display:36px;--fw-display:560; --fs-h1:24px;--lh-h1:30px;--fw-h1:600; --fs-h2:18px;--lh-h2:24px;--fw-h2:600;
        --fs-kpi:28px;--lh-kpi:32px;--fw-kpi:560; --fs-body:13px;--lh-body:18px;--fw-body:480; --fs-label:12px;--lh-label:16px;--fw-label:500; --fs-cap:11px;--lh-cap:14px;--fw-cap:480; --fs-eyebrow:10px;--lh-eyebrow:12px;--fw-eyebrow:620;
        --s-1:4px;--s-2:8px;--s-3:12px;--s-4:16px;--s-5:24px;--s-6:24px;--s-8:32px;--s-10:40px;--s-12:48px;--s-16:64px;
        --r-chip:8px;--r-input:8px;--r-card:10px;--r-card-lg:10px;
    }
    * { box-sizing: border-box; font-feature-settings: var(--tnum); }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
        background: var(--bg-0);
        color: var(--text-1);
        font: var(--fw-body) var(--fs-body)/var(--lh-body) var(--font);
        -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
      .text-3{color:var(--text-3)} 
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    :focus { outline: none; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
    /* Thin monochrome scrollbars + selection — chrome carries no accent */
    * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.14) transparent; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.20); background-clip: padding-box; }
    ::-webkit-scrollbar-corner { background: transparent; }
    ::selection { background: rgba(255,255,255,0.16); color: #fff; }

    /* ---- App shell ---- */
    .app { display: grid; grid-template-columns: 72px 1fr; min-height: 100vh; }
    .sidebar {
        background: var(--sidebar);
        border-right: 1px solid var(--border-soft);
        padding: 16px 0;
        display: flex; flex-direction: column; align-items: center; gap: 6px;
        position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .brand { display: flex; align-items: center; justify-content: center; padding: 4px 0 16px; }

    .nav-item.active { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 28%, transparent); }

    .main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
        display: flex; align-items: center; gap: 14px;
        padding: 14px 26px; border-bottom: 1px solid var(--border-soft);
        position: sticky; top: 0; z-index: 20; background: color-mix(in srgb, var(--bg) 88%, transparent);
        -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
    }
    .search { position: relative; flex: 0 1 360px; }
    .search input {
        width: 100%; height: 38px; border-radius: 10px; border: 1px solid var(--border);
        background: var(--card); color: var(--text); padding: 0 12px 0 36px; font-size: 13.5px;
    }
    .search input:focus { outline: none; border-color: color-mix(in srgb, var(--accent) 55%, var(--border)); }
    .search svg { position: absolute; left: 11px; top: 10px; width: 17px; height: 17px; color: var(--faint); }
    
    .tbtn {
        display: inline-flex; align-items: center; gap: 7px;
        height: 36px; padding: 0 13px; border-radius: 9px;
        border: 1px solid var(--border); background: var(--card); color: var(--muted);
        font-size: 13px; font-weight: 600;
    }
    .tbtn svg { width: 15px; height: 15px; }
    .tbtn:hover { color: var(--text); border-color: var(--border); background: var(--card-2); }
    .tbtn.primary { background: color-mix(in srgb, var(--accent) 22%, var(--card)); border-color: color-mix(in srgb, var(--accent) 45%, var(--border)); color: var(--text); }
    .tbtn.primary:hover { background: color-mix(in srgb, var(--accent) 34%, var(--card)); }

    .content { padding: 24px 26px 60px; max-width: 1640px; width: 100%; }
    .page-head { margin-bottom: 18px; }
    .page-title { font-size: 21px; font-weight: 750; letter-spacing: -0.02em; }
    .page-sub { color: var(--muted); font-size: 13.5px; margin-top: 2px; }

    /* ---- Cards ---- */
    .card {
        background: var(--card); border: 1px solid var(--border-soft); border-radius: var(--radius);
        padding: 18px;
    }
    .card-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 14px; display: flex; align-items: center; gap: 9px; }
    .card-title .sub { font-size: 12px; font-weight: 500; color: var(--faint); }

    /* ---- Stat cards ---- */

    .stat-card .label { font-size: 14px; font-weight: 650; color: var(--muted); }
    .stat-card .num { font-size: 52px; font-weight: 800; line-height: 1.05; margin: 4px 0 2px; letter-spacing: -0.02em; }
    .stat-card .meta { font-size: 12.5px; color: var(--faint); }
    .stat-card.good .num { color: var(--green); } .stat-card.good .label { color: color-mix(in srgb, var(--green) 80%, var(--text)); }
    .stat-card.bad { border-color: color-mix(in srgb, var(--red) 55%, var(--border)); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--red) 22%, transparent); background: color-mix(in srgb, var(--red) 6%, var(--card)); }
    .stat-card.bad .num { color: var(--red); } .stat-card.bad .label { color: color-mix(in srgb, var(--red) 80%, var(--text)); }

    /* ---- Health bar ---- */
    .health { display: flex; align-items: center; gap: 16px; padding: 14px 18px; margin-bottom: 20px; }

    /* ---- Dashboard tile grid ---- */

    .kv-row .k { color: var(--muted); }
    .kv-row .v { font-weight: 650; }
    .v.good { color: var(--green); } .v.bad { color: var(--red); } .v.warn { color: var(--yellow); }

    .mini-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px,1fr)); gap: 10px; margin-bottom: 4px; }
    .mini { background: var(--card-2); border: 1px solid var(--border-soft); border-radius: 10px; padding: 10px 12px; }
    .mini .mlabel { font-size: 11.5px; color: var(--faint); }
    .mini .mval { font-size: 18px; font-weight: 750; margin-top: 2px; }

    .meter { margin: 10px 0; }
    .meter-head { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
    .meter-track { height: 8px; border-radius: 999px; background: color-mix(in srgb, var(--text) 8%, transparent); overflow: hidden; }
    .meter-bar { height: 100%; border-radius: 999px; background: var(--live); }
    .meter-bar.warn { background: var(--warn); }
    .meter-bar.bad { background: var(--crit); }
    .meter-foot { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--faint); margin-top: 4px; }

    /* status dot */
    .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; display: inline-block; }
    .dot.good { background: var(--green); box-shadow: 0 0 8px color-mix(in srgb, var(--green) 70%, transparent); }
    .dot.bad { background: var(--red); box-shadow: 0 0 8px color-mix(in srgb, var(--red) 70%, transparent); }
    .dot.warn { background: var(--yellow); }
    .dot.idle { background: var(--faint); }

    .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
    .badge.good { color: var(--green); border-color: color-mix(in srgb, var(--green) 35%, transparent); background: color-mix(in srgb, var(--green) 10%, transparent); }
    .badge.bad { color: var(--red); border-color: color-mix(in srgb, var(--red) 35%, transparent); background: color-mix(in srgb, var(--red) 10%, transparent); }
    .badge.warn { color: var(--yellow); border-color: color-mix(in srgb, var(--yellow) 35%, transparent); background: color-mix(in srgb, var(--yellow) 10%, transparent); }

    /* launcher / service rows */

    .svc-ico { width: 30px; height: 30px; border-radius: 9px; flex: 0 0 auto; display: grid; place-items: center; font-weight: 800; font-size: 11px; color: #fff; }
    .svc-name { font-weight: 650; font-size: 13.5px; }
    .svc-meta { font-size: 11.5px; color: var(--faint); }
    .svc-open { margin-left: auto; color: var(--accent); font-weight: 650; font-size: 13px; }
    .svc-open:hover { text-decoration: underline; }

    .action-row { display: flex; align-items: flex-start; gap: 11px; padding: 11px 0; border-top: 1px solid var(--border-soft); }
    .fix-btn { margin-left: auto; flex: 0 0 auto; background: color-mix(in srgb, var(--red) 18%, var(--card)); border: 1px solid color-mix(in srgb, var(--red) 45%, var(--border)); color: var(--red); border-radius: 8px; padding: 6px 13px; font-weight: 650; font-size: 12.5px; }
    .fix-btn:hover { background: color-mix(in srgb, var(--red) 28%, var(--card)); }

    /* tables */

    /* services directory grid */

    /* empty / placeholder */
    .empty { text-align: center; color: var(--faint); padding: 26px 18px; }
    .empty .ico { font-size: 30px; margin-bottom: 8px; opacity: .7; }
    .notice { display: flex; gap: 11px; align-items: flex-start; padding: 13px 15px; border-radius: 11px; border: 1px dashed var(--border); background: var(--card-2); color: var(--muted); font-size: 13px; }
    .notice b { color: var(--text); }

    /* topology */
    .topo { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 8px 0 4px; }

    .topo-ico .dot { position: absolute; right: -2px; top: -2px; width: 11px; height: 11px; border: 2px solid var(--card); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .toggle { position: relative; width: 40px; height: 22px; border-radius: 999px; background: var(--card-2); border: 1px solid var(--border); flex: 0 0 auto; transition: background .15s; }
    .toggle::after { content: ''; position: absolute; left: 2px; top: 1px; width: 18px; height: 18px; border-radius: 50%; background: var(--faint); transition: transform .15s, background .15s; }
    .toggle.on { background: color-mix(in srgb, var(--accent) 50%, var(--card-2)); border-color: var(--accent); }
    .toggle.on::after { transform: translateX(18px); background: var(--accent); }

    .set-row .set-desc { font-size: 12px; color: var(--faint); }
    .set-input { height: 36px; border-radius: 9px; border: 1px solid var(--border); background: var(--card-2); color: var(--text); padding: 0 11px; width: 100%; }

    .updated { font-size: 11.5px; color: var(--faint); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1100px) {

    }
    @media (max-width: 880px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { position: fixed; left: 0; top: 0; z-index: 60; transform: translateX(-100%); transition: transform .2s; width: 72px; }
        .sidebar.open { transform: none; }

        .grid-2 { grid-template-columns: 1fr; }
        .search { flex: 1; }
    }

    /* ---- mobile bottom-tab navigation ---- */
    .botnav { display: none; }
    .botsheet, .botsheet-back { display: none; }
    @media (max-width: 880px) {
        
        .botnav {
            display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 70;
            justify-content: space-around; gap: 2px;
            background: color-mix(in srgb, var(--sidebar) 94%, transparent); backdrop-filter: blur(14px);
            border-top: 1px solid var(--border-soft); padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
        }
        .botnav-item {
            flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 3px;
            padding: 6px 2px; border-radius: 11px; color: var(--faint);
            background: none; border: 0; cursor: pointer; font: inherit; font-size: 10.5px; font-weight: 650;
            text-decoration: none; transition: color .14s;
        }
        .botnav-item svg { width: 21px; height: 21px; }
        .botnav-item span { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .botnav-item.active { color: var(--accent); }
        .botnav-item:active { background: var(--card); }
        .content { padding-bottom: 86px; }
        .botsheet-back {
            display: block; position: fixed; inset: 0; z-index: 71; background: rgba(0,0,0,.5);
            opacity: 0; pointer-events: none; transition: opacity .2s;
        }
        .botsheet-back.open { opacity: 1; pointer-events: auto; }
        .botsheet {
            display: block; position: fixed; left: 0; right: 0; bottom: 0; z-index: 72;
            background: var(--card); border-top: 1px solid var(--border);
            border-top-left-radius: 18px; border-top-right-radius: 18px;
            padding: 8px 12px calc(18px + env(safe-area-inset-bottom));
            transform: translateY(100%); transition: transform .22s ease; pointer-events: none;
            box-shadow: 0 -12px 40px rgba(0,0,0,.4);
        }
        .botsheet.open { transform: none; pointer-events: auto; }
        .botsheet-grip { width: 40px; height: 4px; border-radius: 999px; background: var(--border); margin: 6px auto 12px; }
        .botsheet-row { display: flex; align-items: center; gap: 14px; padding: 13px 10px; border-radius: 12px; color: var(--text); text-decoration: none; }
        .botsheet-row svg { width: 22px; height: 22px; color: var(--muted); flex: 0 0 auto; }
        .botsheet-row.active { color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent); }
        .botsheet-row.active svg { color: var(--accent); }
    }

    /* ---- Dashboard mockup layout ---- */
    /* Two independent columns so the right side packs tightly (no void under
       Media/Action while Networking is tall). Left & right each span 6 of the
       same 12-col track used by the top row, so every edge still lines up. */
    .dash { display: grid; gap: 18px; grid-template-columns: repeat(12, 1fr); align-items: start; }

    .launch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .launch-tile { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 13px 6px; border-radius: 12px; border: 1px solid var(--border-soft); background: var(--card-2); text-align: center; transition: border-color .12s, background .12s; }
    .launch-tile:hover { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, var(--card-2)); }
    .launch-tile span { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    @media (max-width: 760px) { .launch-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 1180px) {  }
    @media (max-width: 760px) {  }

    /* networking tile */
    
    .net-status .dot { width: 11px; height: 11px; }
    
    .net-up.good { color: var(--green); } .net-up.bad { color: var(--red); }
    
    .ns-label { font-size: 11.5px; color: var(--faint); }

    .dev-ico { width: 30px; height: 30px; border-radius: 8px; background: var(--card-2); border: 1px solid var(--border-soft); display: grid; place-items: center; font-size: 14px; flex: 0 0 auto; }

    /* truenas tile */

    /* media tile */
    .media-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
    .media-big { font-size: 24px; font-weight: 800; margin-top: 1px; }

    /* action tile */
    .action-big { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
    .action-num { font-size: 44px; font-weight: 800; color: var(--red); line-height: 1; }

    /* docker tile cards */

    .ctr-top .svc-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .ctr-actions { display: flex; gap: 6px; }

    .cbtn.warn:hover { border-color: var(--red); color: var(--red); }

    /* toast */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none;
        background: var(--card-2); border: 1px solid var(--border); color: var(--text); padding: 12px 18px; border-radius: 11px; box-shadow: var(--shadow);
        font-size: 13px; max-width: 480px; z-index: 100; transition: opacity .2s, transform .2s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* real logo icons */
    .svc-ico-img { border-radius: 8px; object-fit: contain; background: rgba(255,255,255,0.05); padding: 3px; flex: 0 0 auto; box-sizing: border-box; }
    .card-title .svc-ico-img { vertical-align: middle; }

    /* containers list (clean, dense) */

    .ctr-seg button.active { background: color-mix(in srgb, var(--accent) 22%, var(--card)); color: var(--text); }

    .ctr-list { display: flex; flex-direction: column; }

    .ctr-nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }

    .ctr-sub { font-size: 11.5px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .ctr-pill.good { color: var(--green); }

    .ctr-item:hover .ctr-ops { opacity: 1; }
    .iconbtn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: var(--card-2); color: var(--muted); font-size: 12px; cursor: pointer; display: grid; place-items: center; }
    .iconbtn:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .iconbtn.danger:hover:not(:disabled) { color: var(--red); border-color: var(--red); }
    .iconbtn:disabled { opacity: .28; cursor: default; }
    
    @media (max-width: 760px) {
        .ctr-item { flex-wrap: wrap; }

        .stat-compact .stat-card .num { font-size: 26px; }
        .stat-compact .stat-card .label { font-size: 12px; }
        .stat-compact .stat-card .meta { display: none; }
    }

    /* service rows + open link */

    /* network topology tree (org-chart style, connectors = real uplinks) */
    
    .org { min-width: max-content; margin: 0 auto; }
    .org ul { list-style: none; margin: 0; padding: 11px 0 0; display: flex; justify-content: center; position: relative; }
    .org > ul { padding-top: 0; }
    .org li { list-style: none; position: relative; padding: 11px 8px 0; display: flex; flex-direction: column; align-items: center; }
    .org li::before, .org li::after { content: ''; position: absolute; top: 0; right: 50%; width: 50%; height: 11px; border-top: 2px solid var(--border); }
    .org li::after { right: auto; left: 50%; border-left: 2px solid var(--border); }
    .org li:only-child::before, .org li:only-child::after { display: none; }
    .org li:only-child { padding-top: 11px; }
    .org li:first-child::before, .org li:last-child::after { border: 0 none; }
    .org li:last-child::before { border-right: 2px solid var(--border); }
    .org ul ul::before { content: ''; position: absolute; top: 0; left: 50%; height: 11px; border-left: 2px solid var(--border); }
    .org > ul > li { padding-top: 0; }
    .org > ul > li::before, .org > ul > li::after { display: none; }
    .tnode { display: flex; flex-direction: column; align-items: center; gap: 3px; width: 98px; padding: 8px 8px; border: 1px solid var(--border); border-radius: 12px; background: var(--card-2); }
    .tnode.off { opacity: .5; }
    .tnode .dev-img, .tnode .dev-ico { background: transparent; }
    .tnode-name { font-size: 12.5px; font-weight: 650; text-align: center; line-height: 1.15; }
    .tnode-meta { font-size: 10px; color: var(--faint); display: flex; align-items: center; gap: 4px; }
    .tnode-stat { font-size: 10px; font-weight: 650; color: var(--accent); }

    /* settings forms */
    .set-field { margin-bottom: 11px; }
    .set-field label { display: block; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
    
    .svc-add { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .svc-add .set-input { flex: 1; min-width: 130px; }
    .restore-chip { cursor: pointer; }

    @media (max-width: 760px) { .svc-add .set-input { flex-basis: 100%; max-width: none; } .set-field-row .set-input { flex-basis: 100%; max-width: none; } }

    /* containers table + logs */

    .ct-row.sel td { background: color-mix(in srgb, var(--accent) 10%, transparent); }

    .ct-act .iconbtn { width: 28px; height: 28px; }

    .ctr-card-top .svc-ico-img, .ctr-card-top .svc-ico { border-radius: 9px; flex: 0 0 auto; }

    .ctr-card-acts .iconbtn { width: 27px; height: 27px; }

    .conn-type.good { color: var(--green); } .conn-type.warn { color: var(--yellow); } .conn-type.bad { color: var(--red); }

    @media (max-width: 640px) {  }

    .cli-sig.good { color: var(--green); } .cli-sig.warn { color: var(--yellow); } .cli-sig.bad { color: var(--red); }

    }

    /* device-type icons + real product images */
    .dev-ico svg { width: 62%; height: 62%; }
    
    .dev-img { object-fit: contain; border-radius: 6px; background: rgba(255,255,255,0.04); flex: 0 0 auto; }
    .topo-ico .dev-img { background: transparent; }

    /* ============ GAUGE flat surfaces — no glows, no glass, no gradients ============ */
    body { background: var(--bg); }
    .card {
        background: var(--s0);
        border: 1px solid var(--hair);
        border-radius: var(--r);
        box-shadow: none;
    }
    
    .stat-card.good { box-shadow: none; }
    /* Meters — ONE solid semantic color, recolored only at real thresholds. No gradients. */
    .meter-bar { background: var(--live); }
    .meter-bar.warn { background: var(--warn); }
    .meter-bar.bad  { background: var(--crit); }

    /* ---- Tracearr idle ---- */

    /* Design has no top bar on the dashboard — cards start flush at the top
       (desktop only; mobile keeps the bar so the hamburger menu stays). */
    @media (min-width: 901px) { body[data-route="dashboard"] .topbar { display: none; } }

    /* ---- Dashboard top: hero + stat cards ----
       Shares the same 12-column track as the .dash grid below so card edges
       line up exactly (Fleet Health over Networking, stats over Media/Action). */
    
    .top-grid .hero { grid-column: span 6; }
    
    .hero { display: flex; align-items: center; gap: 14px; padding: 16px 26px; }

    .kstat .kn.teal { color: var(--accent); text-shadow: 0 0 22px color-mix(in srgb, var(--accent) 45%, transparent); }
    
    .kstat .kn.sm { font-size: 46px; }

    @media (max-width: 1180px) {  .top-grid .hero { grid-column: span 6; }  }
    @media (max-width: 760px) {  .top-grid .hero { grid-column: span 2; flex-direction: column; text-align: center; gap: 6px; padding: 16px; }   }

    /* ---- Motion — reserved, in-place. No entrance stagger, no hover-lift, no count-up. ---- */
    .card { transition: border-color var(--t), background var(--t); }
    @keyframes cardRise { from { opacity: 0; } to { opacity: 1; } }
    @keyframes arcDraw { from { stroke-dashoffset: 100; } }
    @keyframes barGrow { from { transform: none; } to { transform: none; } }
    .hero { position: relative; }

    @keyframes livePulse { 0% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--accent) 60%, transparent); } 70% { box-shadow: 0 0 0 7px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
    @media (prefers-reduced-motion: reduce) { .view-anim .card, .view-anim .arcg path:last-of-type, .view-anim .kbar span, .view-anim .tbar-fill, .view-anim .meter-bar, .live-dot { animation: none !important; } .card:hover { transform: none; } }

    /* ---- Networking tile ---- */
    .net-grid { display: grid; grid-template-columns: 1fr 196px; gap: 20px; align-items: stretch; }
    .net-main { display: flex; flex-direction: column; min-width: 0; }
    .net-cap { font-size: 13px; color: var(--muted); }
    .net-big { font-size: 30px; font-weight: 800; letter-spacing: -0.02em; margin: 2px 0 10px; }
    .net-spark { flex: 1; min-height: 132px; display: flex; align-items: flex-end; }
    .net-spark .spark { width: 100%; height: 132px; }
    .net-pills { display: flex; flex-direction: column; gap: 11px; }
    .npill { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 11px; background: var(--card-2); border: 1px solid var(--border-soft); font-size: 13.5px; }
    .npill b { font-weight: 700; }
    .npill .npl { color: var(--muted); display: flex; gap: 8px; align-items: center; }
    .npill .npl svg { width: 16px; height: 16px; flex: 0 0 auto; }
    @media (max-width: 560px) { .net-grid { grid-template-columns: 1fr; } }

    /* ---- Media Operations dot grid ---- */
    .mop-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 11px 16px; margin-top: 16px; }
    .media-rate { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-soft); font-size: 12.5px; color: var(--muted); }
    .media-rate b { font-weight: 700; color: var(--faint); }
    .media-rate b.on { color: var(--accent); }
    .mop-svc { display: flex; align-items: center; gap: 8px; font-size: 13px; min-width: 0; }
    .mop-svc .dot { flex: 0 0 auto; }
    .mop-nm { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ---- TrueNAS gradient bars ---- */
    
    .tnas-bars { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; gap: 18px; margin-top: 14px; }
    .tbar-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; font-size: 14px; margin-bottom: 10px; font-weight: 600; }
    .tbar-val { font-size: 12.5px; font-weight: 600; color: var(--muted); }
    .tbar-val.warn { color: var(--yellow); } .tbar-val.bad { color: var(--red); }
    .tbar-track { height: 9px; border-radius: 999px; background: var(--card-2); overflow: hidden; }
    .tbar-fill { height: 100%; border-radius: 999px; background: var(--live); transition: width .6s ease; }
    .tbar-fill.warn { background: var(--warn); }
    .tbar-fill.bad { background: var(--crit); }
    .net-sub { font-size: 13px; color: var(--faint); margin-bottom: 14px; }
    /* ---- Action Needed all-clear ---- */
    .ok-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 22px 10px; text-align: center; min-height: 120px; }
    .ok-check { width: 56px; height: 56px; color: var(--accent); }
    .ok-check svg { width: 100%; height: 100%; }
    .ok-msg { color: var(--muted); font-size: 13.5px; }

    /* ---- Docker list ---- */
    .dk-sub { font-size: 13px; color: var(--muted); margin: -6px 0 10px; }
    .dk-list { max-height: 340px; overflow-y: auto; }
    .dk-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px solid var(--border-soft); font-size: 13.5px; }
    .dk-row:last-child { border-bottom: 0; }
    .dk-nm { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dk-mem { color: var(--faint); font-size: 12px; }

    /* ---- Sparklines ---- */
    .spark { display: block; overflow: visible; }
    .spark-wrap { margin-top: 10px; }
    .spark-wrap .spark { width: 100%; height: auto; }

    /* ---- Circular gauges ---- */
    
    .gauge { position: relative; width: 132px; flex: 0 0 auto; text-align: center; }
    .gauge svg { display: block; margin: 0 auto; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35)); }
    .gauge-val { position: absolute; top: 46px; left: 0; right: 0; font-size: 27px; font-weight: 800; letter-spacing: -0.02em; }
    .gauge-lbl { font-size: 13px; font-weight: 650; color: var(--muted); margin-top: 6px; }
    .gauge-sub { font-size: 11.5px; color: var(--faint); margin-top: 1px; }
    .gauge.sm { width: 104px; }
    .gauge.sm .gauge-val { top: 34px; font-size: 20px; }

    /* ---- Service tile grid ---- */

    .apptabs button.active { background: color-mix(in srgb, var(--accent) 20%, var(--card)); color: var(--text); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 30%, transparent); }
    
    .apptabs button.active .seg-n { color: var(--accent); }
    .svc-tile {
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0) 80px), var(--card);
        border: 1px solid var(--border-soft); border-radius: 16px; padding: 20px 16px 16px;
        display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 26px rgba(0,0,0,0.24);
        transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
    }
    .svc-tile:hover { border-color: var(--hair-2); background: var(--s1); }
    .svc-tile img, .svc-tile .ico-fb { width: 44px; height: 44px; border-radius: 11px; }

    .svc-tile.off { opacity: 0.72; }
    
    .svc-grid-head .sub { font-size: 13px; color: var(--faint); }

    /* ---- Connection pills ---- */
    
    .conn-pill.wifi { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); background: color-mix(in srgb, var(--accent) 10%, transparent); }
    .conn-pill.wired { color: var(--blue); border-color: color-mix(in srgb, var(--blue) 45%, transparent); background: color-mix(in srgb, var(--blue) 10%, transparent); }
    
    .sig-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 6px; }
    .sig-badge.good { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
    .sig-badge.ok { color: var(--yellow); background: color-mix(in srgb, var(--yellow) 14%, transparent); }
    .sig-badge.low { color: var(--red); background: color-mix(in srgb, var(--red) 14%, transparent); }

    /* ---- Network monitor: Top Clients + Other Devices ---- */

    .tc-bw.sm { font-size: 22px; }

    .sig-good { color: var(--green); } .sig-ok { color: var(--yellow); } .sig-low { color: var(--red); }

    .col-hist .spark { width: 96px; height: 28px; }

    /* ---- Command palette (Cmd/Ctrl-K) ---- */
    .cmdk-ov { position: fixed; inset: 0; z-index: 200; background: rgba(2,6,8,0.55); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); display: none; align-items: flex-start; justify-content: center; padding-top: 12vh; }
    .cmdk-ov.show { display: flex; animation: cmdkIn .12s ease; }
    @keyframes cmdkIn { from { opacity: 0; } to { opacity: 1; } }
    .cmdk { width: min(640px, 92vw); background: var(--s1); border: 1px solid var(--hair-2); border-radius: var(--r); box-shadow: var(--sh-pop); overflow: hidden; }
    .cmdk-input { width: 100%; box-sizing: border-box; border: 0; background: transparent; color: var(--text); font-size: 16px; padding: 17px 18px; outline: none; border-bottom: 1px solid var(--border-soft); }
    .cmdk-input::placeholder { color: var(--faint); }

    .cmdk-row { display: flex; align-items: center; gap: 11px; padding: 9px 11px; border-radius: var(--r-well); cursor: pointer; }
    .cmdk-row.sel { background: var(--s3); box-shadow: inset 2px 0 0 var(--live); }
    .cmdk-group-label { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t4); padding: 10px 11px 4px; }
    .cmdk-ico .dot { width: 8px; height: 8px; }

    .cmdk-sub { font-size: 12px; color: var(--faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    .cmdk-empty { padding: 22px; text-align: center; color: var(--faint); font-size: 13px; }

    /* ---- Metrics (Grafana) ---- */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
    .metric-card { background: var(--card); border: 1px solid var(--border-soft); border-radius: 14px; overflow: hidden; box-shadow: 0 10px 26px rgba(0,0,0,0.24); }
    .metric-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 11px 14px; font-size: 13.5px; font-weight: 650; border-bottom: 1px solid var(--border-soft); }
    .metric-head .iconbtn { width: 24px; height: 24px; }
    .metric-img { display: block; width: 100%; height: auto; background: var(--card-2); }
    .metric-err { padding: 36px 16px; text-align: center; color: var(--muted); font-size: 13.5px; line-height: 1.6; }
    .metric-err span { color: var(--faint); font-size: 12px; }

    /* ---- Per-service uptime strip ---- */
    .up-strip { display: flex; gap: 2px; align-items: flex-end; height: 13px; margin-top: 9px; width: 100%; max-width: 130px; }
    .up-bar { flex: 1 1 auto; min-width: 2px; height: 100%; border-radius: 2px; background: var(--border); }
    .up-bar.ok { background: color-mix(in srgb, var(--green) 80%, transparent); }
    .up-bar.slow { background: var(--yellow); }
    .up-bar.down { background: var(--red); }

    /* ---- Integration widget tiles ---- */
    .ig-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px, 1fr)); gap: 18px; }
    .ig-slot { min-width: 0; position: relative; cursor: grab; }

    .ig-bar { margin-bottom: 10px; } .ig-bar:last-child { margin-bottom: 0; }
    .ig-bar-h { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .ig-items { margin-top: 10px; display: flex; flex-direction: column; }
    .ig-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px; }
    .ig-item:last-child { border-bottom: 0; }
    .ig-item-l { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ig-item-s { color: var(--faint); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ig-item-v { margin-left: auto; flex: 0 0 auto; font-weight: 700; font-size: 11px; padding: 2px 7px; border-radius: 6px; }
    .ig-err { color: var(--muted); font-size: 13px; padding: 14px 4px; }
    .ig-load { display: grid; place-items: center; padding: 24px; color: var(--muted); }

    /* ---- Integrations catalog (Settings) ---- */
    .ig-cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .ig-cat { border: 1px solid var(--border-soft); border-radius: 12px; background: var(--card-2); overflow: hidden; align-self: start; }
    .ig-cat.on { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
    .ig-cat.open { grid-column: 1 / -1; }

    .ig-cat-h .svc-ico-img, .ig-cat-h .svc-ico { width: 28px; height: 28px; border-radius: 8px; flex: 0 0 auto; }

    .ig-cat-t { font-weight: 650; font-size: 13.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
