    /* — Host: the instrument cluster — */
    .hero-split { display: flex; align-items: stretch; }
    .hero-cpu { flex: 1 1 auto; min-width: 0; padding: 14px 18px 16px; }
    .hero-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }

    .hero-delta { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11px; color: var(--t3); }
    /* direction of change is not health — deltas stay neutral (state lives on the hero figure) */
    .hero-delta.up, .hero-delta.dn { color: var(--t3); }
    .status-ribbon { display: flex; gap: 1px; height: 3px; margin: 12px 0 8px; border-radius: 2px; overflow: hidden; }
    .status-ribbon i { flex: 1; background: var(--idle); } .status-ribbon i.ok { background: var(--live); } .status-ribbon i.warn { background: var(--warn); } .status-ribbon i.crit { background: var(--crit); }
    .hero-plot { height: 200px; }
    .hero-plot .chart-plot { height: 200px; }
    .hero-load { flex: 0 0 296px; border-left: 1px solid var(--hair); padding: 14px 18px 16px; display: flex; flex-direction: column; gap: 13px; }
    .loadbar { display: flex; align-items: center; gap: 10px; }
    .loadbar-lbl { width: 28px; flex: 0 0 auto; font: var(--f-lbl); color: var(--t3); }
    .loadbar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--s2); position: relative; overflow: hidden; }
    .loadbar-fill { display: block; height: 100%; background: var(--live); border-radius: 4px; }
    .loadbar-fill.warn { background: var(--warn); } .loadbar-fill.crit { background: var(--crit); }
    .loadbar-val { width: 46px; flex: 0 0 auto; text-align: right; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 12px; color: var(--t1); }
    .hero-uptime { margin-top: auto; display: flex; align-items: baseline; gap: 8px; padding-top: 8px; border-top: 1px solid var(--hair); }
    .hero-uptime .mono { color: var(--t1); font-size: 13px; font-feature-settings: var(--tnum); }
    .reservoir { position: relative; height: 36px; border-radius: var(--r-well); background: var(--s2); overflow: hidden; margin: 2px 0; }
    .reservoir-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--live); opacity: .82; transition: width var(--t-2); }
    .reservoir-fill.warn { background: var(--warn); } .reservoir-fill.crit { background: var(--crit); }
    .reservoir-trend { position: absolute; inset: 0; width: 100%; height: 100%; opacity: .4; pointer-events: none; }
    .reservoir-trend .spark { width: 100%; height: 100%; }
    .thermal-group { margin-top: 6px; } .thermal-group .group-eye { display: block; padding: 8px 0 5px; }
    .thermal-matrix { display: grid; grid-template-columns: repeat(auto-fill, minmax(98px, 1fr)); gap: 8px; }
    .therm-cell { border: 1px solid var(--hair); border-radius: var(--r-well); padding: 8px 9px; background: var(--s0); position: relative; overflow: hidden; }
    .therm-cell::before { content: ""; position: absolute; inset: 0; background: var(--sev-col, transparent); opacity: calc(var(--sev, 0) * 0.16); pointer-events: none; }
    .therm-lbl { position: relative; font: var(--f-lbl); color: var(--t3); display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .therm-val { position: relative; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 16px; font-weight: 560; color: var(--t1); }
    .therm-cell[data-state=warn] .therm-val { color: var(--warn-ink); } .therm-cell[data-state=crit] .therm-val { color: var(--crit-ink); }
    .therm-bar { position: relative; display: block; height: 3px; border-radius: 2px; background: var(--live); margin-top: 6px; }
    .therm-cell[data-state=warn] .therm-bar { background: var(--warn); } .therm-cell[data-state=crit] .therm-bar { background: var(--crit); }
    .cooling-rail { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 2px; }
    .cool-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 11px; border: 1px solid var(--hair); border-radius: var(--r-pill); background: var(--s0); font: var(--f-lbl); }
    .cool-track { width: 42px; height: 5px; border-radius: 3px; background: var(--s2); overflow: hidden; } .cool-track i { display: block; height: 100%; background: var(--live); }
    .cool-pill .mono { color: var(--t1); font-feature-settings: var(--tnum); }
    .hw-foot { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; padding: 16px 4px 0; color: var(--t3); font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11px; }
    .hw-foot .sep { color: var(--t4); }
    @media (max-width: 1000px) { .hero-split { flex-direction: column; } .hero-load { flex: none; border-left: 0; border-top: 1px solid var(--hair); } .thermal-matrix { grid-template-columns: repeat(auto-fill, minmax(84px, 1fr)); } }

    /* — Storage: the capacity spine — */
    .spine-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; padding: 4px 4px 14px; flex-wrap: wrap; }
    .spine-free { font: var(--f-hero); font-family: var(--mono); font-feature-settings: var(--tnum); letter-spacing: var(--f-hero-tr); color: var(--t1); line-height: 1; }
    .spine-of { font: var(--f-lbl); color: var(--t3); margin-top: 5px; }
    .spine-head-r { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
    .spine-fleetbar { padding: 13px 16px 11px; }
    .fleetbar-track { display: flex; height: 22px; border-radius: var(--r-well); overflow: hidden; background: var(--s2); }
    .fleetseg { position: relative; border: 0; padding: 0; background: var(--s0); overflow: hidden; cursor: pointer; min-width: 10px; }
    .fleetseg + .fleetseg { border-left: 1px solid var(--bg); }
    .fleetseg-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--live); opacity: .8; }
    .fleetseg[data-state=warn] .fleetseg-fill { background: var(--warn); } .fleetseg[data-state=crit] .fleetseg-fill { background: var(--crit); }
    .fleetseg-redline { position: absolute; top: 0; bottom: 0; left: 80%; width: 1px; background: var(--hair-2); }
    .fleetseg-lbl { position: absolute; left: 8px; top: 4px; font: var(--f-lbl); color: #fff; font-family: var(--mono); z-index: 1; mix-blend-mode: difference; }
    .fleetbar-scale { display: flex; justify-content: space-between; margin-top: 7px; font: var(--f-lbl); color: var(--t4); }
    .fleetbar-scale .redline-lbl { color: var(--t3); }
    .pool-rail { display: flex; flex-direction: column; }
    .pool-lane { border: 1px solid var(--hair); border-radius: var(--r); background: var(--s0); margin-bottom: 10px; overflow: hidden; }
    .pool-lane[data-state=warn] { box-shadow: inset 2px 0 0 var(--warn); } .pool-lane[data-state=crit] { box-shadow: inset 2px 0 0 var(--crit); }
    .pool-lane-summary { display: flex; align-items: center; gap: 18px; padding: 12px 16px; cursor: pointer; }
    .cap-ring { position: relative; width: 76px; height: 76px; flex: 0 0 auto; margin: 0; }
    .cap-ring svg { width: 76px; height: 76px; display: block; }
    .ring-track { fill: none; stroke: var(--s3); stroke-width: 7; }
    .ring-fill { fill: none; stroke: var(--live); stroke-width: 7; stroke-linecap: round; }
    .cap-ring[data-state=warn] .ring-fill { stroke: var(--warn); } .cap-ring[data-state=crit] .ring-fill { stroke: var(--crit); }
    .ring-redline { stroke: var(--t2); stroke-width: 2; }
    .cap-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
    .cap-ring-center b { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 12.5px; color: var(--t1); }
    .cap-ring-center .lbl { font-size: 9px; color: var(--t4); text-transform: uppercase; letter-spacing: .06em; }
    .pool-ident { flex: 1 1 auto; min-width: 0; }
    .pool-name-row { display: flex; align-items: center; gap: 10px; }
    .pool-name { font: var(--f-read); color: var(--t1); }
    .pool-sub { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 12px; color: var(--t2); margin-top: 4px; }
    .pool-scrub { font: var(--f-lbl); color: var(--t3); margin-top: 3px; }
    .integrity-strip { display: flex; gap: 5px; flex: 0 0 auto; align-items: center; }
    .itick { width: 26px; height: 8px; border-radius: 2px; background: var(--idle); opacity: .4; }
    .itick[data-state=ok] { background: var(--ok); opacity: .85; } .itick[data-state=warn] { background: var(--warn); opacity: .9; } .itick[data-state=crit] { background: var(--crit); opacity: 1; } .itick[data-state=idle] { background: var(--idle); opacity: .35; }
    .pool-chev { color: var(--t4); transition: transform var(--t); flex: 0 0 auto; width: 16px; height: 16px; }
    .pool-lane[data-expanded=true] .pool-chev { transform: rotate(180deg); }
    .pool-lane-detail { display: none; padding: 2px 16px 14px; border-top: 1px solid var(--hair); }
    .pool-lane[data-expanded=true] .pool-lane-detail { display: block; }
    .dataset-tree { padding-top: 12px; }
    .ds-head { padding-bottom: 6px; }
    .ds-row { display: flex; align-items: center; gap: 12px; height: 27px; }
    .ds-name { flex: 0 0 auto; width: 260px; font-family: var(--mono); font-size: 11.5px; color: var(--t2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ds-meter { flex: 1; height: 6px; border-radius: 3px; background: var(--s2); overflow: hidden; max-width: 340px; } .ds-meter i { display: block; height: 100%; background: var(--live); } .ds-meter i.warn { background: var(--warn); } .ds-meter i.bad { background: var(--crit); }
    .ds-v { flex: 0 0 auto; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11.5px; color: var(--t1); width: 72px; text-align: right; }
    .pool-protect { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 16px; padding-top: 14px; }
    .protect-col .protect-line { font-family: var(--mono); font-size: 11.5px; color: var(--t2); margin-top: 4px; }
    .protect-note { font: var(--f-lbl); color: var(--t4); margin-top: 4px; }
    .integrity-note { font: var(--f-lbl); color: var(--t3); padding: 10px 4px 2px; }
    .integrity-note a, .pool-scrub a { color: var(--t2); text-decoration: underline; }
    @media (max-width: 700px) { .pool-lane-summary { flex-wrap: wrap; gap: 12px; } .ds-name { width: 150px; } }

    /* — Network: the spatial canvas — */
    .wan-body { display: flex; gap: 20px; align-items: stretch; padding: 6px 14px 12px; }
    .wan-ident { flex: 0 0 210px; display: flex; flex-direction: column; justify-content: center; gap: 2px; border-right: 1px solid var(--hair); padding-right: 18px; }
    .wan-isp { font: var(--f-read); color: var(--t1); }
    .wan-ip { font-family: var(--mono); font-size: 11px; color: var(--t3); }
    .wan-hero { font: var(--f-hero); font-family: var(--mono); font-feature-settings: var(--tnum); letter-spacing: var(--f-hero-tr); color: var(--t1); line-height: 1; margin-top: 8px; }
    .wan-hero .wan-unit { font-size: 15px; color: var(--t3); }
    .wan-sub { display: flex; align-items: center; gap: 7px; font: var(--f-lbl); color: var(--t3); margin-top: 5px; }
    .wan-mirror-wrap { flex: 1 1 auto; min-width: 0; position: relative; display: flex; align-items: center; }
    .wan-mirror { width: 100%; height: 118px; display: block; }
    .wan-legend { position: absolute; top: 4px; right: 6px; display: flex; gap: 12px; font: var(--f-lbl); }
    .wan-legend .rx { color: var(--live); } .wan-legend .tx { color: var(--info); }
    .net-stage { margin-bottom: 12px; }
    .instrument.topo { padding: 0; }
    .topo-wrap { overflow: auto; padding: 10px 12px 14px; }
    .topo-canvas { width: 100%; height: auto; display: block; min-width: 620px; }
    .edge { fill: none; stroke: var(--hair-2); }
    .edge.live { stroke: var(--live); }
    .edge.off { stroke: var(--crit); opacity: .5; }
    .tnode-box { fill: var(--s2); stroke: var(--hair); cursor: pointer; }
    .tnode.sel .tnode-box { stroke: var(--live); }
    .tnode.off .tnode-box { stroke: var(--crit); }
    .tnode-inner { display: flex; align-items: center; gap: 8px; height: 100%; padding: 0 10px; cursor: pointer; }
    .tnode-inner .dev-ico, .tnode-inner .dev-img { flex: 0 0 auto; }
    .tnode-txt { min-width: 0; }
    .tnode-nm { font: var(--f-lbl); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tnode-cl { font-family: var(--mono); font-size: 9.5px; color: var(--t3); display: flex; align-items: center; gap: 4px; }
    .tnode-cl .dot { width: 5px; height: 5px; }
    
    .insp-sub { font: var(--f-lbl); color: var(--t3); margin-bottom: 8px; }
    .insp-row { display: flex; align-items: center; gap: 10px; min-height: 30px; border-top: 1px solid var(--hair); }
    .insp-row:first-of-type { border-top: 0; }
    .insp-k { flex: 1; font: var(--f-row); color: var(--t2); display: flex; align-items: center; gap: 8px; }
    .insp-v { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 12px; color: var(--t1); }
    .fp-ports { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; margin-top: 10px; }
    .fp-port { aspect-ratio: 1; border-radius: 3px; background: var(--s2); border-top: 2px solid var(--idle); display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--mono); color: var(--t4); }
    .fp-port.up { color: var(--t1); border-top-color: var(--ok); }
    .fp-port.spd-1g { border-top-color: var(--ok); } .fp-port.spd-25g { border-top-color: var(--live); } .fp-port.spd-10g { border-top-color: var(--info); } .fp-port.poe { box-shadow: inset 0 -2px 0 var(--warn); }
    .fp-poe { display: flex; align-items: center; gap: 8px; margin-top: 12px; font: var(--f-lbl); color: var(--t3); }
    .poe-bar { flex: 1; height: 5px; border-radius: 3px; background: var(--s2); overflow: hidden; } .poe-bar i { display: block; height: 100%; background: var(--warn); }
    .ap-rung { display: flex; align-items: center; gap: 8px; min-height: 28px; border-top: 1px solid var(--hair); font: var(--f-lbl); }
    .ap-rung:first-of-type { border-top: 0; margin-top: 6px; }
    .ap-rung .band { width: 54px; color: var(--t1); } .ap-rung .ch { font-family: var(--mono); color: var(--t2); flex: 1; } .ap-rung .badge2 { font-size: 9px; color: var(--t3); border: 1px solid var(--hair); border-radius: 4px; padding: 1px 5px; }
    .crow { display: flex; align-items: center; gap: 12px; height: 34px; border-top: 1px solid var(--hair); padding: 0 4px; }
    .crow:first-of-type { border-top: 0; }
    .crow:hover { background: var(--s2); }
    .cx-name { flex: 0 0 230px; display: flex; align-items: baseline; gap: 8px; overflow: hidden; }
    .cx-name b { font: var(--f-row); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cx-ip { font-family: var(--mono); font-size: 10.5px; color: var(--t3); flex: 0 0 auto; }
    .cx-vendor { font-size: 10px; color: var(--t4); flex: 0 0 auto; }
    .cx-sig { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; flex: 0 0 auto; }
    .cx-sig i { width: 3px; background: var(--idle); border-radius: 1px; }
    .cx-sig.sig-good i { background: var(--ok); } .cx-sig.sig-ok i { background: var(--warn); } .cx-sig.sig-low i { background: var(--crit); } .cx-sig.wired i { background: var(--info); }
    .cx-band { flex: 0 0 96px; font-family: var(--mono); font-size: 11px; color: var(--t3); }
    .cx-uplink { flex: 1; font: var(--f-lbl); color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cx-thru { flex: 0 0 auto; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11.5px; color: var(--t1); }
    .cx-thru .ul { color: var(--t3); }
    @media (max-width: 1000px) { .cx-band, .cx-uplink { display: none; } .wan-ident { flex: 0 0 150px; } }

    /* — shared detail drawer (4.1): right slide-over, bottom sheet ≤880px — */
    .drawer-scrim { position: fixed; inset: 0; background: rgba(4, 6, 7, .55); opacity: 0; pointer-events: none; transition: opacity .2s ease; z-index: 90; }
    .drawer-scrim[data-open="true"] { opacity: 1; pointer-events: auto; }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: min(430px, 92vw); background: var(--s1); border-left: 1px solid var(--hair-2); box-shadow: var(--sh-pop); transform: translateX(102%); transition: transform .22s cubic-bezier(.22, .8, .26, 1); z-index: 91; display: flex; flex-direction: column; }
    .drawer[data-open="true"] { transform: none; }
    .drawer-head { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px 12px; border-bottom: 1px solid var(--hair); flex: 0 0 auto; }
    .drawer-title { font: var(--f-h); color: var(--t1); display: flex; align-items: center; gap: 10px; min-width: 0; }
    .drawer-sub { font: var(--f-lbl); color: var(--t3); margin-top: 3px; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 10px 16px 16px; }
    .drawer-foot { flex: 0 0 auto; display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--hair); }
    .drawer-x { flex: 0 0 auto; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--hair); border-radius: var(--r-well); background: transparent; color: var(--t3); cursor: pointer; font-size: 13px; }
    .drawer-x:hover { color: var(--t1); border-color: var(--hair-2); }
    @media (max-width: 767px) {
        /* phones get a bottom sheet; tablets keep the side drawer (master-detail) */
        .drawer { top: auto; left: 0; right: 0; bottom: 0; width: auto; max-height: 78vh; border-left: 0; border-top: 1px solid var(--hair-2); border-radius: 14px 14px 0 0; transform: translateY(102%); }
        .drawer[data-open="true"] { transform: none; }
    }

    /* — command-deck stat tiles (Home vitals, Compute pressure) — */
    .deck-vitals { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1px; background: var(--hair); border: 1px solid var(--hair-2); border-radius: var(--r); overflow: hidden; margin-bottom: 12px; box-shadow: var(--sh); }
    .st-tile { background: var(--s1); padding: 11px 13px 10px; display: flex; flex-direction: column; gap: 2px; min-height: 92px; }
    .st-tile.is-link { cursor: pointer; transition: background .12s ease; }
    .st-tile.is-link:hover, .st-tile.is-link:focus-visible { background: var(--s2); outline: none; }
    .st-tile[data-state="warn"] { box-shadow: inset 2px 0 0 var(--warn); }
    .st-tile[data-state="crit"] { box-shadow: inset 2px 0 0 var(--crit); }
    .st-tile[data-state="live"] { box-shadow: inset 2px 0 0 var(--live); }
    .st-label { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); }
    .st-fig { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 23px; font-weight: 560; color: var(--t1); line-height: 1.15; }
    .st-tile[data-state="warn"] .st-fig { color: var(--warn); }
    .st-tile[data-state="crit"] .st-fig { color: var(--crit); }
    .st-tile[data-state="live"] .st-fig { color: var(--live); }
    .st-unit { font-size: 11.5px; font-weight: 480; color: var(--t3); margin-left: 3px; }
    .st-warm { color: var(--t4); }
    .st-sub { font: var(--f-lbl); color: var(--t3); min-height: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .st-spark { margin-top: auto; height: 18px; opacity: .9; }
    .st-meter { margin-top: auto; display: block; height: 4px; border-radius: 2px; background: var(--s3); overflow: hidden; }
    .st-meter i { display: block; height: 100%; background: var(--t3); }
    .st-tile[data-state="warn"] .st-meter i { background: var(--warn); }
    .st-tile[data-state="crit"] .st-meter i { background: var(--crit); }

    /* — calm all-clear line — */
    .deck-calm-row { display: flex; align-items: center; gap: 10px; min-height: 44px; padding: 0 14px; }
    .deck-calm-txt { font: var(--f-h); color: var(--t1); }
    .deck-calm-sub { font: var(--f-lbl); color: var(--t3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .deck-calm-link { font: var(--f-lbl); color: var(--t3); text-decoration: none; }
    .deck-calm-link:hover { color: var(--t1); }

    /* — compact fleet ribbon + group chips — */
    .fs-ribbon { display: flex; gap: 3px; padding: 12px 14px 8px; }
    .fs-cell { flex: 1; height: 8px; border-radius: 2px; min-width: 4px; }
    .fs-cell.ok { background: color-mix(in srgb, var(--ok) 55%, var(--s2)); }
    .fs-cell.warn { background: var(--warn); }
    .fs-cell.crit { background: var(--crit); }
    .fs-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 14px 12px; }
    .fs-chip { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 9px; border: 1px solid var(--hair); border-radius: var(--r-pill, 99px); background: transparent; color: var(--t2); font: var(--f-lbl); cursor: pointer; }
    .fs-chip:hover { border-color: var(--hair-2); color: var(--t1); }
    .fs-chip.has-down { border-color: color-mix(in srgb, var(--crit) 45%, transparent); }
    .fs-chip .dot { width: 5px; height: 5px; }

    /* — quick actions + coverage foot band — */
    .deck-actions { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin: 12px 0 4px; }
    .da-btn { height: 28px; padding: 0 12px; border: 1px solid var(--hair); border-radius: var(--r-well); background: var(--s0); color: var(--t2); font: var(--f-lbl); cursor: pointer; }
    .da-btn:hover { color: var(--t1); border-color: var(--hair-2); }
    .da-cov { margin-left: auto; font: var(--f-lbl); color: var(--t4); }
    .da-cov a { color: var(--t3); }

    /* — Compute: memory breakdown — */
    .membar { display: flex; height: 14px; border-radius: 4px; background: var(--s2); overflow: hidden; margin: 4px 0 10px; }
    .membar-seg.apps { background: var(--t3); }
    .membar-seg.cache { background: color-mix(in srgb, var(--live) 32%, var(--s3)); }
    .mem-rows { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 0 22px; }
    .mem-row { display: flex; align-items: center; gap: 10px; min-height: 28px; border-top: 1px solid var(--hair); }
    .mem-row .mem-k { flex: 1; font: var(--f-row); color: var(--t2); }
    .mem-row.dim .mem-k { color: var(--t3); }
    .mem-row.warn .mem-v { color: var(--warn); }
    .mem-v { font-feature-settings: var(--tnum); font-size: 12px; color: var(--t1); }
    .mem-verdict { display: flex; align-items: center; gap: 8px; margin-top: 10px; font: var(--f-row); color: var(--t2); }
    .mem-verdict[data-state="warn"] { color: var(--warn); }
    .mem-verdict[data-state="crit"] { color: var(--crit); }
    .load-note { font: var(--f-lbl); color: var(--t3); margin: 8px 0 2px; line-height: 1.45; }
    .load-note b { color: var(--t1); font-weight: 560; }

    /* — Compute: thermal heat map — */
    .heat-group { margin-top: 10px; }
    .heat-group:first-child { margin-top: 2px; }
    .heat-group-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
    .heat-group-max { font-size: 10.5px; color: var(--t4); }
    .heat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 4px; }
    .heat-cell { border-radius: 6px; padding: 8px 9px 7px; background: var(--s2); display: flex; flex-direction: column; gap: 1px; }
    .heat-cell[data-z="ok"] { background: color-mix(in srgb, var(--ok) 9%, var(--s0)); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--ok) 16%, transparent); }
    .heat-cell[data-z="warn"] { background: color-mix(in srgb, var(--warn) 16%, var(--s0)); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--warn) 30%, transparent); }
    .heat-cell[data-z="crit"] { background: color-mix(in srgb, var(--crit) 20%, var(--s0)); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--crit) 38%, transparent); }
    .heat-val { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 15px; color: var(--t1); }
    .heat-cell[data-z="warn"] .heat-val { color: var(--warn); }
    .heat-cell[data-z="crit"] .heat-val { color: var(--crit); }
    .heat-lbl { font-size: 10px; color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .heat-legend { display: inline-flex; align-items: center; gap: 6px; font: var(--f-lbl); color: var(--t3); }
    .heat-legend i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; margin-right: 2px; }
    .heat-legend i[data-z="ok"] { background: color-mix(in srgb, var(--ok) 30%, var(--s2)); }
    .heat-legend i[data-z="warn"] { background: color-mix(in srgb, var(--warn) 45%, var(--s2)); }
    .heat-legend i[data-z="crit"] { background: color-mix(in srgb, var(--crit) 50%, var(--s2)); }

    /* — Compute: consumers grid — */
    .cons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 26px; padding: 8px 14px 12px; }
    @media (max-width: 900px) { .cons-grid { grid-template-columns: 1fr; } }

    /* — Applications: app-stack cards — */
    .app-cat { margin-top: 12px; }
    .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; margin-top: 4px; }
    .app-card { background: var(--s0); border: 1px solid var(--hair); border-radius: var(--r); padding: 12px 13px 11px; cursor: pointer; display: flex; flex-direction: column; gap: 9px; transition: background .12s ease, border-color .12s ease; }
    .app-card:hover, .app-card:focus-visible { background: var(--s2); border-color: var(--hair-2); outline: none; }
    .app-card[data-state="warn"] { box-shadow: inset 2px 0 0 var(--warn); }
    .app-card[data-state="crit"] { box-shadow: inset 2px 0 0 var(--crit); }
    .app-card-head { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .app-id { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .app-name { font: var(--f-h); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .app-meta { font: var(--f-lbl); color: var(--t3); display: flex; align-items: center; gap: 6px; }
    .app-open { flex: 0 0 auto; height: 24px; padding: 0 9px; border: 1px solid var(--hair); border-radius: var(--r-well); background: transparent; color: var(--t3); font: var(--f-lbl); cursor: pointer; }
    .app-open:hover { color: var(--t1); border-color: var(--hair-2); }
    .app-stats { display: flex; gap: 16px; }
    .app-stat { display: flex; flex-direction: column; gap: 0; }
    .as-k { font-size: 9.5px; letter-spacing: .08em; color: var(--t4); }
    .as-v { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 12.5px; color: var(--t1); }
    .app-warn { font: var(--f-lbl); color: var(--warn); }
    .app-roll { display: flex; gap: 18px; padding: 6px 0 2px; }
    .app-drawer-img { font-family: var(--mono); font-size: 10px; color: var(--t4); padding: 0 0 6px 18px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* — Networking: insight lanes + clients drawer — */
    .net-insights { display: grid; grid-template-columns: 1.15fr .85fr; gap: 12px; align-items: start; margin-bottom: 12px; }
    .ni-right { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .ni-left { min-width: 0; }
    .net-insights .cx-name { flex: 0 1 190px; }
    .net-insights .cx-band { flex: 0 0 78px; }
    @media (max-width: 1100px) { .net-insights { grid-template-columns: 1fr; } }
    .crow.is-link { cursor: pointer; }
    .net-browse { display: flex; align-items: center; gap: 14px; padding: 10px 14px; border: 1px dashed var(--hair-2); border-radius: var(--r); margin-bottom: 12px; }
    .net-browse .lbl { color: var(--t3); }
    .dcli { padding: 7px 2px 8px; border-top: 1px solid var(--hair); }
    .dcli:first-child { border-top: 0; }
    .dcli-main { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .dcli-main b { font: var(--f-row); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .dcli-thru { flex: 0 0 auto; font-size: 11.5px; color: var(--t1); font-feature-settings: var(--tnum); }
    .dcli-sub { font: var(--f-lbl); color: var(--t3); margin-top: 2px; padding-left: 24px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* — Dropped Needle lane (Media) — */
    .dn-body { padding: 10px 14px 12px; }
    .dn-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .dn-chip { display: inline-flex; align-items: center; gap: 8px; height: 30px; padding: 0 11px; border: 1px solid var(--hair); border-radius: var(--r-well); background: var(--s0); color: var(--t2); font: var(--f-lbl); text-decoration: none; }
    a.dn-chip:hover { border-color: var(--hair-2); color: var(--t1); }
    .dn-chip[data-state="warn"] { border-color: color-mix(in srgb, var(--warn) 45%, transparent); }
    .dn-chip[data-state="warn"] .dn-chip-v { color: var(--warn); }
    .dn-chip[data-state="live"] .dn-chip-v { color: var(--live); }
    .dn-chip-v { font-feature-settings: var(--tnum); font-size: 12.5px; color: var(--t1); }
    .dn-chip-go { color: var(--t4); font-size: 10px; }
    .dn-search { display: flex; gap: 8px; margin: 2px 0 6px; max-width: 480px; }
    .dn-search .deck-search { flex: 1; }
    .dn-rels { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 4px; }
    .dn-rel { min-width: 0; }
    .dn-rel-art { width: 100%; aspect-ratio: 1; border-radius: 8px; object-fit: cover; background: var(--s2); display: block; }
    .dn-rel-fb { display: flex; align-items: center; justify-content: center; font: 600 26px var(--mono); color: var(--t4); }
    .dn-rel-t { font: var(--f-row); color: var(--t1); margin-top: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dn-rel-a { font: var(--f-lbl); color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dn-np { display: flex; align-items: center; gap: 9px; min-height: 30px; border-top: 1px solid var(--hair); }
    .dn-np:first-of-type { border-top: 0; }
    .dn-badge { display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px; font-size: 9px; letter-spacing: .04em; vertical-align: 1px; }
    .dn-badge.in { color: var(--ok); border: 1px solid color-mix(in srgb, var(--ok) 40%, transparent); }
    .dn-badge.req { color: var(--warn); border: 1px solid color-mix(in srgb, var(--warn) 40%, transparent); }
    button.dn-chip { cursor: pointer; }
    button.dn-chip:hover { border-color: var(--hair-2); color: var(--t1); }
    /* — Settings OS shell — */
    .set-rail-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px; border: 0; background: transparent; border-radius: 8px; color: var(--t2); cursor: pointer; text-align: left; }
    .set-rail-item svg { width: 16px; height: 16px; flex: 0 0 auto; color: var(--t3); }
    .set-rail-item:hover { background: var(--s2); }
    .set-rail-item.active { background: var(--s2); color: var(--t1); box-shadow: inset 2px 0 0 var(--live); }
    .set-rail-item.active svg { color: var(--live); }
    .sri-txt { display: flex; flex-direction: column; min-width: 0; }
    .sri-txt b { font: var(--f-row); font-weight: 560; color: inherit; }
    .sri-txt i { font-style: normal; font-size: 10.5px; color: var(--t4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .set-hits { margin-bottom: 8px; border: 1px solid var(--hair); border-radius: 8px; background: var(--s0); overflow: hidden; }
    .set-hit { display: flex; flex-direction: column; width: 100%; text-align: left; padding: 7px 10px; border: 0; border-top: 1px solid var(--hair); background: transparent; cursor: pointer; }
    .set-hit:first-child { border-top: 0; }
    .set-hit:hover { background: var(--s2); }
    .set-hit b { font: var(--f-row); color: var(--t1); }
    .set-hit i { font-style: normal; font-size: 10px; color: var(--t4); }
    .set-intel { margin-bottom: 14px; border: 1px solid var(--hair-2); border-radius: var(--r); background: var(--s0); overflow: hidden; }
    .intel-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-top: 1px solid var(--hair); }
    .intel-row:first-child { border-top: 0; }
    .intel-msg { flex: 1; font: var(--f-row); color: var(--t2); min-width: 0; }
    .pv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 10px; }
    .pv-card { background: var(--s0); border: 1px solid var(--hair); border-radius: var(--r); padding: 12px 13px; display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .pv-card[data-state="warn"] { box-shadow: inset 2px 0 0 var(--warn); }
    .pv-card[data-state="crit"] { box-shadow: inset 2px 0 0 var(--crit); }
    .pv-head { display: flex; align-items: center; gap: 10px; min-width: 0; }
    /* DN's official mark is dark-on-transparent — give it a light plate so it reads on our canvas */
    img.svc-ico-img[src*="droppedneedle"] { background: #ece7db; border-radius: 7px; padding: 2px; }
    .pv-id { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .pv-name { font: var(--f-h); color: var(--t1); }
    .pv-meta { font: var(--f-lbl); color: var(--t3); display: flex; align-items: center; gap: 6px; }
    .pv-kind { font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--t4); border: 1px solid var(--hair); border-radius: 4px; padding: 2px 6px; flex: 0 0 auto; }
    .pv-facts { display: flex; flex-wrap: wrap; gap: 6px 14px; }
    .pv-fact { font: var(--f-lbl); color: var(--t3); }
    .pv-err { font: var(--f-lbl); color: var(--warn); }
    .pv-acts { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: auto; }
    .pv-add { align-items: center; justify-content: center; text-align: center; border-style: dashed; border-color: var(--hair-2); cursor: pointer; background: transparent; min-height: 120px; }
    .pv-add:hover { background: var(--s2); }
    .pv-add-plus { font: 300 26px var(--mono); color: var(--t3); }
    .sec-score-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: stretch; }
    .sec-score { display: flex; flex-direction: column; gap: 4px; min-width: 180px; justify-content: center; }
    .sec-score-fig { font-size: 34px; font-weight: 560; color: var(--ok); line-height: 1.1; font-feature-settings: var(--tnum); }
    .sec-score-fig[data-state="warn"] { color: var(--warn); }
    .audit-table { max-height: 320px; overflow-y: auto; }
    .audit-row { display: flex; align-items: center; gap: 12px; min-height: 28px; border-top: 1px solid var(--hair); font-size: 11.5px; }
    .audit-row:first-child { border-top: 0; }
    .audit-ts { color: var(--t4); font-size: 10.5px; flex: 0 0 130px; }
    .audit-act { color: var(--t1); font: var(--f-row); flex: 0 0 150px; }
    .audit-tgt { color: var(--t3); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ap-preview { border: 1px dashed var(--hair-2); border-radius: var(--r); padding: 14px; }
    .drawer-cfg .set-input { width: 100%; }
    @media (max-width: 900px) { .sec-score-row { flex-direction: column; } }
    /* — density: compact packs more homelab per screen — */
    body[data-density="compact"] .lane-body { padding-top: 4px; padding-bottom: 8px; }
    body[data-density="compact"] .lane-head { min-height: 30px; }
    body[data-density="compact"] .st-tile { min-height: 74px; padding: 8px 11px 8px; }
    body[data-density="compact"] .insp-row, body[data-density="compact"] .mem-row { min-height: 24px; }
    body[data-density="compact"] .crow { height: 30px; }
    body[data-density="compact"] .serviceLane { min-height: 26px; }
    body[data-density="compact"] .app-card { padding: 9px 11px 9px; gap: 6px; }
    body[data-density="compact"] .view { padding-top: 10px; }
    /* — reduced motion: kill pulses and slides (also honors the OS preference) — */
    body[data-motion="reduced"] *, body[data-motion="reduced"] *::before, body[data-motion="reduced"] *::after { animation: none !important; transition: none !important; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }

    .dn-np-t { font: var(--f-row); color: var(--t1); }
    .dn-np-a { font: var(--f-lbl); color: var(--t3); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dn-np-prog { font-size: 11px; color: var(--t2); font-feature-settings: var(--tnum); }
    .dn-np-u { font: var(--f-lbl); color: var(--t4); }

    /* — first-run setup overlay — */
    .onboard { position: fixed; inset: 0; z-index: 80; background: var(--bg); display: flex; align-items: center; justify-content: center; overflow-y: auto; }
    .onboard::before { content: ''; position: fixed; inset: 0; background: radial-gradient(120% 80% at 50% -10%, color-mix(in srgb, var(--live) 8%, transparent), transparent 60%); pointer-events: none; }
    .ob-shell { width: 100%; max-width: 480px; padding: 32px 22px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .ob-card { width: 100%; background: var(--s1); border: 1px solid var(--hair-2); border-radius: 16px; box-shadow: var(--sh-pop); padding: 26px 26px 22px; }
    .ob-hero { text-align: center; }
    .ob-logo { width: 52px; height: 52px; margin: 0 auto 14px; border-radius: 14px; background: var(--s2); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 0 1px var(--hair-2); }
    .ob-logo svg { width: 26px; height: 26px; color: var(--live); }
    .ob-logo.done { background: color-mix(in srgb, var(--ok) 14%, var(--s2)); }
    .ob-title { font: 620 24px var(--mono); color: var(--t1); margin: 0 0 6px; letter-spacing: -.01em; }
    .ob-lead { font: var(--f-read); color: var(--t2); margin: 0 auto; max-width: 360px; line-height: 1.5; }
    .ob-head { margin-bottom: 16px; }
    .ob-head h2 { font: 600 18px var(--font); color: var(--t1); margin: 4px 0 4px; }
    .ob-head p { font: var(--f-lbl); color: var(--t3); margin: 0; line-height: 1.5; }
    .ob-step { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--live); }
    .ob-field { margin-bottom: 12px; }
    .ob-field label { display: block; font: var(--f-lbl); color: var(--t2); margin-bottom: 5px; }
    .ob-field .set-input { width: 100%; min-height: 42px; }
    .ob-opt { color: var(--t4); text-transform: none; letter-spacing: 0; }
    .ob-note { font: var(--f-lbl); color: var(--t3); background: var(--s0); border: 1px solid var(--hair); border-radius: 10px; padding: 10px 12px; margin: 6px 0 4px; line-height: 1.5; }
    .ob-note.ok { border-color: color-mix(in srgb, var(--ok) 32%, transparent); color: var(--t2); }
    .ob-note code { font-family: var(--mono); font-size: 11px; color: var(--t2); background: var(--s2); padding: 1px 5px; border-radius: 4px; }
    .ob-note a { color: var(--live); }
    .ob-msg { font: var(--f-lbl); min-height: 16px; margin-bottom: 6px; }
    .ob-msg.ok { color: var(--ok); } .ob-msg.bad { color: var(--crit); }
    .ob-sub { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); margin: 14px 0 8px; }
    .ob-provs { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; }
    .ob-prov { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 12px 6px; border: 1px solid var(--hair); border-radius: 12px; background: var(--s0); color: var(--t2); cursor: pointer; min-height: 76px; justify-content: center; }
    .ob-prov:hover { border-color: var(--hair-2); background: var(--s2); color: var(--t1); }
    .ob-prov span { font: var(--f-lbl); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
    .ob-actions { display: flex; gap: 10px; margin-top: 18px; }
    .ob-actions .tbtn { flex: 1; min-height: 44px; justify-content: center; }
    .ob-actions .ob-primary { background: var(--live); color: #04110e; border-color: var(--live); font-weight: 600; }
    .ob-actions .ob-primary:hover { background: color-mix(in srgb, var(--live) 88%, #fff); }
    .ob-actions .ghost { flex: 0 0 auto; padding: 0 16px; }
    .ob-fine { text-align: center; font: var(--f-lbl); color: var(--t4); margin: 14px 0 0; }
    .ob-summary { display: flex; flex-direction: column; gap: 8px; margin: 4px 0; }
    .ob-check { display: flex; align-items: center; gap: 10px; font: var(--f-read); color: var(--t2); }
    .ob-dots { display: flex; gap: 7px; }
    .ob-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--s3); }
    .ob-dot.on { background: var(--live); width: 20px; border-radius: 4px; }
    .ob-dot.done { background: color-mix(in srgb, var(--live) 55%, var(--s3)); }
    body.onboarding { overflow: hidden; }

    /* ═══════════════════════════════════════════════════════════════════════
       RESPONSIVE LAYER — appended last so it always wins the cascade.
       Desktop (1280–1919) is the reference and is deliberately untouched here.
       ═══════════════════════════════════════════════════════════════════════ */
    .topo-scroll { overflow-x: auto; }                     /* wide SVG scrolls inside its instrument, never the page */
    .topo-collapsed { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
    .topo-collapsed .lbl { flex: 1; }
    .uw-rail { display: none; }

    /* ── ≥768: tablets & up — icon rail is the sidebar, phone chrome goes away ── */
    @media (min-width: 768px) {
        /* Restore BOTH the two-column tracks AND the area map here: the ≤880px
           Slate block flips grid-template-areas to a single column, and without
           re-declaring it the 768–880px range renders a 60px sliver. */
        .app { grid-template-columns: 60px 1fr; grid-template-rows: auto 1fr auto; grid-template-areas: "rail topbar" "rail view" "rail dock"; }
        .rail { display: flex; flex-direction: column; }
        .botnav, .botsheet, .botsheet-back { display: none !important; }
    }

    /* ── tablet portrait 768–1023: two-up vitals pairs, roomy touch targets ── */
    @media (min-width: 768px) and (max-width: 1023px) {
        .deck-vitals { grid-template-columns: repeat(3, 1fr); }
        .compute-band { grid-template-columns: repeat(3, 1fr); }
        .hero-split { grid-template-columns: 1fr; }
        .hero-load { border-left: 0; border-top: 1px solid var(--hair); padding: 12px 2px 0; margin-top: 10px; }
        .tbtn, .da-btn { min-height: 34px; }
        .set-shell { grid-template-columns: 200px 1fr; }
    }

    /* ── phone ≤767: a different app, not a squeezed one ── */
    @media (max-width: 767px) {
        .app { grid-template-columns: 1fr; }
        .rail { display: none; }
        .view { padding: 0; }
        .view-inner { padding: 10px 12px calc(84px + env(safe-area-inset-bottom)); }
        /* Logs toolbar: give the container name its own line so it never shrinks
           to 0 behind the fixed-width search + buttons. */
        .logs-bar { flex-wrap: wrap; }
        .logs-title { flex: 1 1 100%; }
        .logs-search { flex: 1 1 auto; }
        /* bottom navigation in GAUGE clothes */
        .botnav { display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 70; justify-content: space-around; gap: 2px;
            background: color-mix(in srgb, var(--s0) 92%, transparent); backdrop-filter: blur(14px);
            border-top: 1px solid var(--hair-2); padding: 6px 4px calc(7px + env(safe-area-inset-bottom)); }
        .botnav-item { color: var(--t3); font-size: 10px; font-weight: 560; min-height: 44px; }
        .botnav-item.active { color: var(--live); }
        .botnav-item:active { background: var(--s2); border-radius: 10px; }
        /* — the More sheet, rebuilt on GAUGE tokens (old Slate vars are gone) — */
        .botsheet-back { display: block; position: fixed; inset: 0; background: rgba(4, 6, 7, .55); opacity: 0; pointer-events: none; transition: opacity .18s ease; z-index: 75; }
        .botsheet-back.open { opacity: 1; pointer-events: auto; }
        .botsheet { display: block; position: fixed; left: 0; right: 0; bottom: 0; z-index: 76; background: var(--s1); border-top: 1px solid var(--hair-2); border-radius: 16px 16px 0 0; box-shadow: var(--sh-pop); padding: 8px 14px calc(16px + env(safe-area-inset-bottom)); transform: translateY(102%); transition: transform .22s cubic-bezier(.22, .8, .26, 1); pointer-events: none; }
        .botsheet.open { transform: none; pointer-events: auto; }
        .botsheet-grip { width: 40px; height: 4px; border-radius: 99px; background: var(--s3); margin: 4px auto 10px; }
        .botsheet-title { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); padding: 0 10px 6px; }
        .botsheet-row { display: flex; align-items: center; gap: 13px; min-height: 52px; padding: 0 10px; border-radius: 12px; color: var(--t1); text-decoration: none; font: var(--f-row); }
        .botsheet-row svg { width: 20px; height: 20px; color: var(--t3); flex: 0 0 auto; }
        .botsheet-row:active { background: var(--s2); }
        .botsheet-row.active { color: var(--live); background: color-mix(in srgb, var(--live) 10%, transparent); }
        .botsheet-row.active svg { color: var(--live); }
        .botsheet-sub { margin-left: auto; font: var(--f-lbl); color: var(--t4); max-width: 46%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        /* topbar: crumb + pill only, everything fits */
        .topbar { padding: 0 12px; gap: 8px; }
        .conn-badge #connTxt { display: none; }
        /* vitals: strict two-up, thumb-sized */
        .deck-vitals, .compute-band { grid-template-columns: repeat(2, 1fr); }
        .st-tile { min-height: 84px; padding: 10px 12px 9px; }
        .st-fig { font-size: 21px; }
        /* lanes breathe less, rows grow for touch */
        .lane { margin-bottom: 10px; }
        .lane-head { padding: 8px 12px 7px; }
        .lane-body { padding-left: 12px; padding-right: 12px; }
        .tbtn, .da-btn, .app-open, .fs-chip, .dn-chip, .drawer-x { min-height: 40px; }
        .iconbtn { min-width: 40px; min-height: 40px; }
        input.set-input, input.deck-search { font-size: 16px; min-height: 40px; }   /* 16px stops iOS focus-zoom */
        /* Home */
        .deck-live-grid { grid-template-columns: 1fr; }
        .deck-consumers { border-left: 0; border-top: 1px solid var(--hair); }
        .deck-calm-sub { white-space: normal; }
        .fs-ribbon { flex-wrap: nowrap; }
        .da-cov { margin-left: 0; width: 100%; }
        /* Compute: single-column cockpit, shorter hero */
        .hero-split { grid-template-columns: 1fr; }
        .hero-load { border-left: 0; border-top: 1px solid var(--hair); padding: 12px 2px 0; margin-top: 10px; }
        .cons-grid { grid-template-columns: 1fr; }
        .heat-grid { grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); }
        .mem-rows { grid-template-columns: 1fr; }
        /* Media: session rows become cards — who + cost, pipeline detail on tap */
        .floor-h { display: none; }
        .floor-row { grid-template-columns: 44px minmax(0, 1fr) auto !important; grid-auto-rows: auto; row-gap: 4px; padding: 10px 12px; }
        .floor-dev, .floor-codec, .floor-row .pipe-glyph, .floor-row svg.pipe-glyph { display: none; }
        .floor-bw { justify-self: end; }
        .dn-rels { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .dn-search { max-width: none; }
        /* Networking */
        .wan-body { flex-direction: column; align-items: stretch; }
        .wan-ident { flex: none; }
        .net-insights { grid-template-columns: 1fr; }
        .net-insights .cx-name { flex: 1 1 auto; }
        .crow { height: auto; min-height: 44px; flex-wrap: wrap; padding: 6px 4px; }
        .net-browse { flex-wrap: wrap; }
        /* Applications */
        .app-grid { grid-template-columns: 1fr; }
        .deck-controls { flex-wrap: wrap; }
        .deck-search { flex: 1 1 100%; }
        /* Settings: dedicated phone experience — grouped index → detail pages */
        .mset { max-width: 560px; margin: 0 auto; }
        .mset .set-input { width: 100%; }
        .mset-group { background: var(--s0); border: 1px solid var(--hair); border-radius: 14px; overflow: hidden; }
        .mset-row { display: flex; align-items: center; gap: 12px; width: 100%; min-height: 54px; padding: 0 12px; border: 0; border-top: 1px solid var(--hair); background: transparent; color: var(--t1); text-align: left; cursor: pointer; }
        .mset-row:first-child { border-top: 0; }
        .mset-row:active { background: var(--s2); }
        .mset-ico { width: 32px; height: 32px; border-radius: 9px; background: var(--s2); display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
        .mset-ico svg { width: 17px; height: 17px; color: var(--t2); }
        .mset-txt { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
        .mset-txt b { font: var(--f-row); font-weight: 560; color: var(--t1); }
        .mset-txt i { font-style: normal; font: var(--f-lbl); color: var(--t4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .mset-chev { color: var(--t4); font-size: 17px; flex: 0 0 auto; }
        .mset-detail { animation: msetIn .18s ease; max-width: 560px; margin: 0 auto; }
        @keyframes msetIn { from { transform: translateX(12px); opacity: .35; } to { transform: none; opacity: 1; } }
        .mset-back { display: inline-flex; align-items: center; min-height: 40px; padding: 0 10px 0 2px; margin: 0 0 4px -2px; border: 0; background: transparent; color: var(--live); font: var(--f-row); font-weight: 560; cursor: pointer; }
        .mset .set-intel { margin-top: 12px; }
        .grid-2 { grid-template-columns: 1fr; }
        .pv-grid { grid-template-columns: 1fr; }
        .sec-score-row { flex-direction: column; }
        .audit-ts { flex: 0 0 84px; font-size: 9.5px; }
        .audit-act { flex: 0 0 100px; }
        /* drawers already become bottom sheets; make their rows thumb-friendly */
        .drawer-body { padding: 10px 14px calc(14px + env(safe-area-inset-bottom)); }
        .insp-row { min-height: 38px; }
        .dcli { padding: 9px 2px 10px; }
        /* misc guards */
        .hw-foot, .home-foot { flex-wrap: wrap; line-height: 1.7; }
        .state-ribbon { overflow-x: auto; }
        .fp-ports { grid-template-columns: repeat(6, 1fr); }
    }

    /* ── ultrawide ≥1920: richer, not wider — pinned live-context inspector ── */
    @media (min-width: 1920px) {
        .uw-rail { display: block; position: fixed; top: 44px; right: 0; bottom: 0; width: 336px; overflow-y: auto;
            background: var(--s0); border-left: 1px solid var(--hair); padding: 14px 16px calc(16px + env(safe-area-inset-bottom)); z-index: 5; }
        .view { margin-right: 336px; }
        .view-inner { max-width: 1560px; }
        .uw-sec { margin-bottom: 16px; }
        .uw-row { display: flex; align-items: center; gap: 8px; min-height: 28px; border-top: 1px solid var(--hair); font: var(--f-lbl); }
        .uw-row:first-of-type { border-top: 0; }
        .uw-t { color: var(--t1); font: var(--f-row); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .uw-s { color: var(--t3); flex: 0 0 auto; max-width: 46%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .uw-empty { color: var(--t4); font: var(--f-lbl); padding: 4px 0 2px; }
        /* the drawer slides over the inspector, not under it */
        .drawer { z-index: 91; }
    }

    /* — Applications: the patch bay — */

    .spec-hero .eyebrow { display: block; margin-top: 2px; }

    .spec-cell.slow { background: var(--warn); } .spec-cell.down { background: var(--crit); }

    .patch-row .svc-ico-img, .patch-row .svc-ico { flex: 0 0 auto; border-radius: 5px; }

    .patch-strip .spark { width: 100%; height: 22px; }

    @media (max-width: 700px) {   }

    /* ═══ Applications — the Operations Center ═══ */
    .ops-cmdbar { display: flex; overflow: hidden; margin-bottom: 12px; }
    .cmdstat { flex: 1 1 0; display: flex; flex-direction: column; gap: 4px; padding: 11px 16px; border-left: 1px solid var(--hair); min-width: 0; }
    .cmdstat:first-child { border-left: 0; }
    .cmdstat-lbl { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); display: flex; align-items: center; gap: 6px; }
    .cmdstat-lbl svg { width: 12px; height: 12px; opacity: .8; }
    .cmdstat-fig { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 23px; font-weight: 560; color: var(--t1); line-height: 1; }
    .cmdstat[data-state=crit] .cmdstat-fig { color: var(--crit); } .cmdstat[data-state=warn] .cmdstat-fig { color: var(--warn); } .cmdstat[data-state=live] .cmdstat-fig { color: var(--live); }
    .cmd-health { display: flex; align-items: baseline; gap: 12px; }
    .cmd-hcount { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 15px; display: inline-flex; align-items: center; gap: 5px; color: var(--t2); }
    .cmd-hcount b { font-size: 20px; color: var(--t1); font-weight: 560; }
    .cmd-hcount.down b { color: var(--crit); } .cmd-hcount.warn b { color: var(--warn); } .cmd-hcount.ok b { color: var(--ok-ink); }
    .cmdstat-idle .cmdstat-fig { color: var(--t3); }

    .ops-grid { display: grid; grid-template-columns: 264px minmax(0, 1fr) 300px; gap: 12px; align-items: start; }
    .ops-nav { display: flex; flex-direction: column; gap: 10px; position: sticky; top: 56px; }
    .svcnav-group .svcnav-glabel { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); padding: 6px 4px 4px; display: flex; align-items: center; justify-content: space-between; }
    .svcnav-glabel .gc { font-family: var(--mono); color: var(--t4); }
    .svcnav-row { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: var(--r-well); cursor: pointer; border: 1px solid transparent; }
    .svcnav-row:hover { background: var(--s1); }
    .svcnav-row.sel { background: var(--s2); border-color: var(--hair-2); }
    .svcnav-row .svc-ico-img, .svcnav-row .svc-ico { width: 18px; height: 18px; border-radius: 4px; flex: 0 0 auto; }
    .svcnav-id { min-width: 0; }
    .svcnav-name { font: var(--f-row); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .svcnav-sub { font: var(--f-lbl); color: var(--t3); display: flex; align-items: center; gap: 6px; }
    .svcnav-spark { width: 46px; height: 18px; flex: 0 0 auto; }
    .svcnav-spark .spark { width: 100%; height: 18px; }
    .svcnav-lat { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 10.5px; color: var(--t3); flex: 0 0 auto; text-align: right; }
    .svcnav-row[data-state=critical] .svcnav-lat { color: var(--crit-ink); } .svcnav-row[data-state=warning] .svcnav-lat { color: var(--warn-ink); }

    .ops-detail { min-width: 0; }
    .det-head { display: flex; align-items: center; gap: 12px; padding: 14px 16px; }
    .det-head .svc-ico-img, .det-head .svc-ico { width: 34px; height: 34px; border-radius: 7px; flex: 0 0 auto; }
    .det-id { flex: 1 1 auto; min-width: 0; }
    .det-name { font: var(--f-read); color: var(--t1); }
    .det-meta { font: var(--f-lbl); color: var(--t3); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .det-actions { display: flex; gap: 6px; flex: 0 0 auto; }
    .det-btn { height: 30px; padding: 0 12px; border-radius: var(--r-well); border: 1px solid var(--hair); background: var(--s1); color: var(--t2); font: var(--f-lbl); display: inline-flex; align-items: center; gap: 6px; text-decoration: none; cursor: pointer; }
    .det-btn:hover { color: var(--t1); border-color: var(--hair-2); } .det-btn svg { width: 13px; height: 13px; }
    .det-btn.primary { border-color: var(--hair-2); color: var(--t1); }
    .det-sec { padding: 12px 16px; border-top: 1px solid var(--hair); }
    .det-sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .det-sec-head .eyebrow { color: var(--t3); }

    /* summary chips row (streams / direct / transcode / bitrate) */
    .media-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(96px, 1fr)); gap: 1px; background: var(--hair); border-radius: var(--r-well); overflow: hidden; }
    .msum { background: var(--s1); padding: 9px 12px; display: flex; flex-direction: column; gap: 3px; }
    .msum-fig { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 18px; color: var(--t1); font-weight: 560; }
    .msum-lbl { font: var(--f-eye); letter-spacing: var(--f-eye-tr); text-transform: uppercase; color: var(--t3); }
    .msum[data-state=live] .msum-fig { color: var(--live); } .msum[data-state=warn] .msum-fig { color: var(--warn); }

    /* stream cards — the who's-watching centerpiece */
    .stream-card { display: flex; gap: 14px; padding: 12px; border: 1px solid var(--hair); border-radius: var(--r); background: var(--s1); margin-bottom: 10px; }
    .stream-card[data-mode=Transcode] { box-shadow: inset 2px 0 0 var(--warn); }
    .stream-poster { width: 58px; height: 86px; border-radius: 6px; object-fit: cover; flex: 0 0 auto; background: var(--s2); }
    .stream-poster.fallback { display: flex; align-items: center; justify-content: center; color: var(--t3); font-family: var(--mono); font-size: 18px; }
    .stream-body { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 6px; }
    .stream-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .stream-title { font: var(--f-read); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stream-sub { font: var(--f-lbl); color: var(--t3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stream-badges { display: flex; gap: 6px; flex-wrap: wrap; flex: 0 0 auto; }
    .sbadge { display: inline-flex; align-items: center; gap: 5px; height: 20px; padding: 0 8px; border-radius: var(--r-pill); border: 1px solid var(--hair); background: var(--s2); font: var(--f-lbl); color: var(--t2); }
    .sbadge svg { width: 11px; height: 11px; }
    .sbadge.tc { border-color: color-mix(in srgb, var(--warn) 40%, var(--hair)); color: var(--warn-ink); } .sbadge.dp { border-color: color-mix(in srgb, var(--ok) 34%, var(--hair)); color: var(--ok-ink); } .sbadge.ds { color: var(--info); border-color: color-mix(in srgb, var(--info) 34%, var(--hair)); }
    .sbadge.pause { color: var(--t3); }
    .stream-user { display: inline-flex; align-items: center; gap: 6px; font: var(--f-lbl); color: var(--t2); }
    .stream-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--s3); display: inline-flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--mono); color: var(--t1); flex: 0 0 auto; }
    .stream-prog { display: flex; align-items: center; gap: 8px; }
    .stream-prog .pbar { flex: 1; height: 5px; border-radius: 3px; background: var(--s3); overflow: hidden; } .stream-prog .pbar i { display: block; height: 100%; background: var(--live); }
    .stream-prog .ptime { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 10.5px; color: var(--t3); flex: 0 0 auto; }
    .stream-tech { display: flex; flex-wrap: wrap; gap: 4px 14px; font: var(--f-lbl); }
    .stream-tech .tk { color: var(--t4); } .stream-tech .tv { color: var(--t2); font-family: var(--mono); }

    /* download / queue rows (downloaders + *Arr) */
    .q-row { display: flex; align-items: center; gap: 12px; height: 34px; border-top: 1px solid var(--hair); }
    .q-row:first-of-type { border-top: 0; }
    .q-name { flex: 1 1 auto; min-width: 0; font: var(--f-row); color: var(--t1); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .q-prog { flex: 0 0 120px; height: 5px; border-radius: 3px; background: var(--s2); overflow: hidden; } .q-prog i { display: block; height: 100%; background: var(--live); }
    .q-v { flex: 0 0 auto; font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 11px; color: var(--t2); }
    .kpi-tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 1px; background: var(--hair); border-radius: var(--r-well); overflow: hidden; }
    .kpi-tile { background: var(--s1); padding: 10px 12px; }
    .kpi-tile .kt-fig { font-family: var(--mono); font-feature-settings: var(--tnum); font-size: 19px; color: var(--t1); font-weight: 560; }
    .kpi-tile .kt-lbl { font: var(--f-lbl); color: var(--t3); }
    .kpi-tile[data-state=warn] .kt-fig { color: var(--warn); } .kpi-tile[data-state=crit] .kt-fig { color: var(--crit); } .kpi-tile[data-state=good] .kt-fig { color: var(--ok-ink); }
    .connect-note { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 32px 20px; text-align: center; }
    .connect-note .cn-txt { font: var(--f-row); color: var(--t2); } .connect-note .cn-sub { font: var(--f-lbl); color: var(--t3); max-width: 340px; }

    /* insights panel */
    .ops-insights { position: sticky; top: 56px; display: flex; flex-direction: column; gap: 12px; }
    .insight-lane .lane-body { padding-top: 8px; }
    .insight-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid var(--hair); font: var(--f-lbl); color: var(--t2); }
    .insight-row:first-of-type { border-top: 0; }
    .insight-row .dot { width: 6px; height: 6px; }
    .insight-row .ir-ts { margin-left: auto; font-family: var(--mono); color: var(--t4); flex: 0 0 auto; }
    .insight-actions { display: flex; flex-direction: column; gap: 6px; }
    .insight-actions .det-btn { justify-content: flex-start; }
    .rel-chip { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 9px; border-radius: var(--r-pill); background: var(--s1); border: 1px solid var(--hair); font: var(--f-lbl); color: var(--t2); cursor: pointer; }
    .rel-chip:hover { color: var(--t1); border-color: var(--hair-2); }
    .rel-wrap { display: flex; flex-wrap: wrap; gap: 6px; }

    @media (max-width: 1280px) { .ops-grid { grid-template-columns: 240px minmax(0, 1fr); } .ops-insights { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; position: static; } .ops-insights > * { flex: 1 1 260px; } }
    @media (max-width: 820px) { .ops-grid { grid-template-columns: 1fr; } .ops-nav { position: static; flex-direction: row; overflow-x: auto; gap: 14px; } .svcnav-group { min-width: 200px; } .ops-cmdbar { flex-wrap: wrap; } .cmdstat { flex-basis: 33%; } }

    /* — provider attribution strip (concept ← providers) — */
    .provider-strip { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 0 2px 12px; }
    .provider-strip .eyebrow { margin-right: 2px; }
    .prov-chip { display: inline-flex; align-items: center; gap: 6px; height: 24px; padding: 0 10px; border-radius: var(--r-pill); border: 1px solid var(--hair); background: var(--s0); font: var(--f-lbl); color: var(--t3); text-decoration: none; }
    .prov-chip.on { color: var(--t1); border-color: var(--hair-2); background: var(--s1); }
    .prov-chip i { color: var(--t4); font-style: normal; }
    .prov-chip.degraded { color: var(--warn-ink); border-color: color-mix(in srgb, var(--warn) 34%, var(--hair)); }
    .fresh-stale { margin-left: auto; font: var(--f-lbl); font-family: var(--mono); color: var(--warn-ink); display: inline-flex; align-items: center; gap: 6px; }
    .fresh-stale::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--warn); opacity: .8; }
    .prov-chip.add { border-style: dashed; }
    .prov-chip.add:hover { color: var(--live); border-color: var(--live); }

    /* — Containers: the workload deck — */
    .deck-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 2px 2px 12px; }
    .seg { display: inline-flex; background: var(--s1); border: 1px solid var(--hair); border-radius: var(--r-well); overflow: hidden; }
    .seg button { border: 0; background: transparent; color: var(--t3); font: var(--f-lbl); padding: 6px 11px; cursor: pointer; }

/* ---- Prometheus text parsing ---- */
function parseProm(raw) {
    const out = [];
    const lines = raw.split('\n');
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (!line || line.charCodeAt(0) === 35) continue; // '#'
        const sp = line.indexOf('{') >= 0 ? line.indexOf('}') + 1 : line.indexOf(' ');
        const name = line.slice(0, line.indexOf('{') >= 0 ? line.indexOf('{') : line.indexOf(' '));
        const val = Number(line.slice(sp).trim().split(/\s+/)[0]);
        if (!name || !isFinite(val)) continue;
        const labels = {};
        const lb = line.indexOf('{');
        if (lb >= 0) {
            const seg = line.slice(lb + 1, line.indexOf('}'));
            seg.replace(/([a-zA-Z0-9_]+)="((?:[^"\\]|\\.)*)"/g, (_, k, v) => { labels[k] = v.replace(/\\"/g, '"'); return ''; });
        }
        out.push({ name, labels, value: val });
    }
    return out;
}
function pFirst(arr, name, f) { const x = arr.find(l => l.name === name && (!f || f(l))); return x ? x.value : null; }
function pSum(arr, name, f) { let s = 0, any = false; for (const l of arr) if (l.name === name && (!f || f(l))) { s += l.value; any = true; } return any ? s : null; }

function parseHostMetrics(raw) {
    const m = parseProm(raw);
    const memTotal = pFirst(m, 'node_memory_MemTotal_bytes');
    const memAvail = pFirst(m, 'node_memory_MemAvailable_bytes');
    const memUsed = (memTotal != null && memAvail != null) ? memTotal - memAvail : null;
    // Memory breakdown — page cache/buffers are reclaimable, and on TrueNAS the ZFS
    // ARC (also reclaimable) is what makes raw "used %" look scary. Surface all of it.
    const memBuffers = pFirst(m, 'node_memory_Buffers_bytes');
    const memCachedRaw = (pFirst(m, 'node_memory_Cached_bytes') || 0) + (pFirst(m, 'node_memory_SReclaimable_bytes') || 0);
    const memCached = memCachedRaw > 0 ? memCachedRaw : null;
    const zfsArc = pFirst(m, 'node_zfs_arc_size') ?? pFirst(m, 'node_zfs_arc_size_bytes');
    const swapTotal = pFirst(m, 'node_memory_SwapTotal_bytes');
    const swapFree = pFirst(m, 'node_memory_SwapFree_bytes');
    // Disk I/O rate (bytes/s) across physical devices, from two consecutive scrapes.
    const devOk = d => /^(sd[a-z]+|nvme\d+n\d+|vd[a-z]+|xvd[a-z]+)$/.test(d || '');
    const readTot = pSum(m, 'node_disk_read_bytes_total', l => devOk(l.labels.device));
    const writeTot = pSum(m, 'node_disk_written_bytes_total', l => devOk(l.labels.device));
    let ioRead = null, ioWrite = null;
    const ioNow = Date.now();
    if (_ioPrev && readTot != null && ioNow > _ioPrev.t) {
        const dt = (ioNow - _ioPrev.t) / 1000;
        ioRead = Math.max(0, (readTot - _ioPrev.r) / dt);
        ioWrite = Math.max(0, ((writeTot || 0) - (_ioPrev.w || 0)) / dt);
    }
    if (readTot != null) _ioPrev = { r: readTot, w: writeTot, t: ioNow };
    const cores = new Set(m.filter(l => l.name === 'node_cpu_seconds_total' && l.labels.mode === 'idle').map(l => l.labels.cpu)).size || null;
    const idle = pSum(m, 'node_cpu_seconds_total', l => l.labels.mode === 'idle');
    const totalCpu = pSum(m, 'node_cpu_seconds_total');
    let cpuPct = null;
    if (idle != null && totalCpu != null) {
        if (_cpuPrev && totalCpu > _cpuPrev.total) {
            const dt = totalCpu - _cpuPrev.total, di = idle - _cpuPrev.idle;
            cpuPct = Math.max(0, Math.min(100, (1 - di / dt) * 100));
        }
        _cpuPrev = { idle, total: totalCpu };
    }
    if (cpuPct == null) { const l1 = pFirst(m, 'node_load1'); if (l1 != null && cores) cpuPct = Math.min(100, l1 / cores * 100); }
    // storage: largest real filesystem (prefer /mnt pools)
    const fs = m.filter(l => l.name === 'node_filesystem_size_bytes' && l.value > 0 && !/^\/(proc|sys|run|dev|var\/lib\/kubelet|boot)/.test(l.labels.mountpoint || ''));
    let pool = null;
    fs.sort((a, b) => b.value - a.value);
    const mntFs = fs.filter(l => /^\/mnt/.test(l.labels.mountpoint || ''));
    const pick = (mntFs[0] || fs[0]);
    if (pick) {
        const avail = pFirst(m, 'node_filesystem_avail_bytes', l => l.labels.mountpoint === pick.labels.mountpoint && l.labels.device === pick.labels.device);
        pool = { mount: pick.labels.mountpoint, size: pick.value, free: avail, used: avail != null ? pick.value - avail : null };
    }
    const boot = pFirst(m, 'node_boot_time_seconds');

    // All real filesystems (for the Storage page) — skip pseudo/virtual mounts.
    const seenFs = new Set();
    const filesystems = m.filter(l => l.name === 'node_filesystem_size_bytes' && l.value > 0)
        .filter(l => !/^(tmpfs|devtmpfs|squashfs|overlay|ramfs|proc|sysfs|cgroup|nsfs|autofs|fuse\.|binfmt)/i.test(l.labels.fstype || ''))
        .filter(l => !/^\/(proc|sys|run|dev|var\/lib\/(kubelet|docker)|boot\/efi|snap)/.test(l.labels.mountpoint || ''))
        .map(l => {
            const avail = pFirst(m, 'node_filesystem_avail_bytes', x => x.labels.mountpoint === l.labels.mountpoint && x.labels.device === l.labels.device);
            const used = avail != null ? l.value - avail : null;
            return { mount: l.labels.mountpoint, device: l.labels.device, fstype: l.labels.fstype, size: l.value, free: avail, used, pct: (used != null && l.value) ? used / l.value * 100 : null };
        })
        .filter(f => { const k = f.mount + '|' + f.device; if (seenFs.has(k)) return false; seenFs.add(k); return true; })
        .sort((a, b) => b.size - a.size);

    // Temperatures (CPU package/cores, NVMe drives, chipset…) and cooling devices.
    const tempNames = (chip, sensor) => {
        const c = String(chip || '');
        if (/coretemp|k10temp|cpu|package/i.test(c)) return { group: 'CPU', label: sensor === 'temp1' ? 'Package' : ('Core ' + (Number((sensor || '').replace('temp', '')) - 2 >= 0 ? Number((sensor || '').replace('temp', '')) - 2 : sensor)) };
        if (/nvme/i.test(c)) return { group: 'Drives', label: 'NVMe ' + (c.match(/\d+/) || [''])[0] };
        if (/drivetemp|sd[a-z]/i.test(c)) return { group: 'Drives', label: c };
        return { group: 'System', label: c.replace(/_/g, ' ') };
    };
    const temps = m.filter(l => l.name === 'node_hwmon_temp_celsius').map(l => {
        const meta = tempNames(l.labels.chip, l.labels.sensor);
        const crit = pFirst(m, 'node_hwmon_temp_crit_celsius', x => x.labels.chip === l.labels.chip && x.labels.sensor === l.labels.sensor)
            || pFirst(m, 'node_hwmon_temp_max_celsius', x => x.labels.chip === l.labels.chip && x.labels.sensor === l.labels.sensor);
        return { group: meta.group, label: meta.label, value: l.value, crit: crit || null, chip: l.labels.chip };
    }).sort((a, b) => b.value - a.value);
    const cooling = m.filter(l => l.name === 'node_cooling_device_cur_state').map(l => ({
        name: l.labels.name || l.labels.type || 'cooling', cur: l.value,
        max: pFirst(m, 'node_cooling_device_max_state', x => x.labels.name === l.labels.name && x.labels.type === l.labels.type)
    }));

    return {
        memTotal, memUsed, memFree: (memTotal != null && memUsed != null) ? memTotal - memUsed : null,
        memPct: (memUsed != null && memTotal) ? memUsed / memTotal * 100 : null,
        memAvail, memBuffers, memCached, zfsArc,
        swapTotal, swapUsed: (swapTotal != null && swapFree != null) ? swapTotal - swapFree : null,
        ioRead, ioWrite,
        cores, cpuPct, load1: pFirst(m, 'node_load1'), load5: pFirst(m, 'node_load5'), load15: pFirst(m, 'node_load15'),
        storage: pool, filesystems, temps, cooling,
        procs: pFirst(m, 'node_procs_running'),
        uptime: boot ? (Date.now() / 1000 - boot) : null
    };
}

function prettyCtr(n) {
    let s = String(n).replace(/^ix-/, '').replace(/-\d+$/, '');
    const parts = s.split('-');
    if (parts.length >= 2 && parts[0] === parts[1]) parts.shift();
    return parts.join('-') || n;
}

    // Media + Automation concepts: live media activity (Tracearr streams + summary) drives the command

    if (r === 'automation') jobs.push(refreshDownloaders());   // live torrent/nzb queue feeds the pipeline

    if (r === 'smarthome') enabledIntegrations().filter(d => d.category === 'smarthome').forEach(d => jobs.push(refreshWidget(d.id)));   // Home Assistant & friends
    if (r === 'dashboard') { if (!Live.fresh('media', 15000)) jobs.push(refreshTracearr()); enabledIntegrations().forEach(d => jobs.push(refreshWidget(d.id))); customTiles().filter(t => t.type === 'customapi').forEach(t => jobs.push(refreshCustomTile(t.id))); }

    if (s < 5) return 'just now';

    const m = Math.floor(s / 60); if (m < 60) return m + 'm ago';
    return Math.floor(m / 60) + 'h ago';

    for (const k of ['streams', 'sessions', 'activeSessions', 'active', 'items', 'records', 'result']) {

        title = s.mediaTitle || s.showTitle || 'Unknown';
        sub = [s.showTitle, (s.seasonNumber != null && s.episodeNumber != null) ? ('S' + s.seasonNumber + '·E' + s.episodeNumber) : (s.episodeNumber != null ? 'E' + s.episodeNumber : '')].filter(v => v != null && v !== '').join(' · ');

    const cat = Store.integrations || []; if (!cat.length) return [];

        containerList().map(c => ({ name: c.label || c.name, image: c.image }))

    const out = [];

        window.open(pin.auth_url, '_blank', 'noopener');
        say('Waiting for approval on plex.tv…');
        const t0 = Date.now();
        while (Date.now() - t0 < 180000) {
            await new Promise(r => setTimeout(r, 2500));
            const p = await jpost('/api/dn/plex/poll', { pin_id: pin.pin_id });
            if (p.ok && p.completed) { say('✓ signed in as ' + (p.user || 'Plex user') + ' — now hit Enable', 'ok'); toast('Dropped Needle connected via Plex ✓'); return; }
            if (p.error) { say('✗ ' + p.error, 'bad'); return; }
