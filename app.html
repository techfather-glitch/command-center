    items.push({ type: 'Action', label: 'Open Settings', icon: 'gear', kw: 'config preferences providers', run: () => { location.hash = '#/settings'; } });
    items.push({ type: 'Action', label: 'Connect a provider', icon: 'layers', kw: 'add integration setup', run: () => { _setDest = 'providers'; _setCatalogOpen = true; location.hash = '#/settings'; render(); } });
    SET_SECTIONS.forEach(sec => items.push({ type: 'Action', label: 'Settings · ' + sec.label, icon: sec.ico, kw: 'settings preferences ' + sec.sub.toLowerCase(), run: () => { location.hash = '#/settings'; setSettingsDest(sec.id); } }));
    (Store.services || []).forEach(s => items.push({ type: 'Service', label: s.name, svc: s.name, sub: (s.type || 'service') + (svcOnline(s) ? '' : ' · offline'), kw: (s.type || '') + ' ' + (s.host || ''), run: () => { if (s.url) window.open(s.url, '_blank', 'noopener'); else location.hash = '#/media'; } }));
    containerList().forEach(c => items.push({ type: 'Container', label: c.label, svc: c.label, sub: (c.running ? 'running' : 'stopped') + (c.image ? ' · ' + c.image : ''), kw: c.image || '', run: () => { ctrSearch = c.label; location.hash = '#/applications'; } }));
    return items;
}
/* weighted fuzzy ranking: prefix > word-boundary > substring > keyword — every token must land */
function palScore(it, toks) {
    const label = it.label.toLowerCase(), kw = ((it.kw || '') + ' ' + it.type + ' ' + (it.sub || '')).toLowerCase();
    let total = 0;
    for (const t of toks) {
        let s = 0;
        if (label.startsWith(t)) s = 100;
        else if (new RegExp('\\b' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).test(label)) s = 70;
        else if (label.includes(t)) s = 40;
        else if (kw.includes(t)) s = 18;
        if (!s) return 0;
        total += s;
    }
    return total;
}
const PAL_GROUP_ORDER = ['Recent', 'Status', 'Page', 'Action', 'Service', 'Container'];
function paletteFilter() {
    const q = Palette.q.trim().toLowerCase();
    if (!q) {
        const rec = palRecents();
        const recItems = rec.map(lbl => { const it = Palette.items.find(x => x.label === lbl); return it ? { ...it, type: 'Recent' } : null; }).filter(Boolean);
        const rest = Palette.items.filter(it => it.type === 'Status' || it.type === 'Page' || it.type === 'Action');
        Palette.filtered = recItems.concat(rest).slice(0, 40);
        return;
    }
    const toks = q.split(/\s+/);
    Palette.filtered = Palette.items
        .map(it => ({ it, s: palScore(it, toks) }))
        .filter(x => x.s > 0)
        .sort((a, b) => b.s - a.s || PAL_GROUP_ORDER.indexOf(a.it.type) - PAL_GROUP_ORDER.indexOf(b.it.type))
        .slice(0, 60).map(x => x.it);
}
function paletteRender() {
    paletteFilter();
    if (Palette.sel >= Palette.filtered.length) Palette.sel = Math.max(0, Palette.filtered.length - 1);
    const list = document.getElementById('cmdkList'); if (!list) return;
    let html = '', lastGroup = '';
    Palette.filtered.forEach((it, i) => {
        if (it.type !== lastGroup) { html += `<div class="cmdk-group-label">${esc(it.type === 'Recent' ? 'Recent' : it.type === 'Status' ? 'Status' : it.type + 's')}</div>`; lastGroup = it.type; }
        const ico = it.svc ? iconImg(it.svc, 22) : it.state ? `<span class="dot ${it.state}"></span>` : navIconSvg(it.icon || 'apps');
        html += `<div class="cmdk-row ${i === Palette.sel ? 'sel' : ''}" data-i="${i}"><span class="cmdk-ico">${ico}</span><span class="cmdk-lbl">${esc(it.label)}</span>${it.sub ? `<span class="cmdk-sub">${esc(it.sub)}</span>` : ''}</div>`;
    });
    list.innerHTML = Palette.filtered.length ? html : '<div class="cmdk-empty">No matches — try a service, container, page or “stalled”, “full”, “streams”.</div>';
    list.querySelectorAll('.cmdk-row').forEach(r => r.addEventListener('mousedown', e => { e.preventDefault(); paletteRun(Number(r.dataset.i)); }));
    const sel = list.querySelector('.cmdk-row.sel'); if (sel) sel.scrollIntoView({ block: 'nearest' });
}
let _palOpener = null;
function openPalette() {
    _palOpener = document.activeElement;   // restore focus here on close (modal a11y)
    Palette.items = buildPaletteIndex(); Palette.q = ''; Palette.sel = 0; Palette.open = true;
    let ov = document.getElementById('cmdk');
    if (!ov) {
        ov = document.createElement('div'); ov.id = 'cmdk'; ov.className = 'cmdk-ov';
        ov.innerHTML = '<div class="cmdk" role="dialog" aria-modal="true" aria-label="Command palette"><input class="cmdk-input" id="cmdkInput" aria-label="Search services, containers, pages and actions" placeholder="Search services, containers, pages, actions…" autocomplete="off" spellcheck="false"><div class="cmdk-list" id="cmdkList"></div></div>';
        document.body.appendChild(ov);
        ov.addEventListener('mousedown', e => { if (e.target === ov) closePalette(); });
        ov.querySelector('#cmdkInput').addEventListener('input', e => { Palette.q = e.target.value; Palette.sel = 0; paletteRender(); });
    }
    ov.classList.add('show');
    const inp = document.getElementById('cmdkInput'); inp.value = ''; paletteRender(); setTimeout(() => inp.focus(), 0);
}
function closePalette() { Palette.open = false; const ov = document.getElementById('cmdk'); if (ov) ov.classList.remove('show'); if (_palOpener && _palOpener.focus) { try { _palOpener.focus(); } catch (e) {} } _palOpener = null; }
function paletteRun(i) { const it = Palette.filtered[i]; closePalette(); if (it) { palRemember(it.label); try { it.run(); } catch (e) {} } }
document.addEventListener('keydown', e => {
    if ((e.key === 'k' || e.key === 'K') && (e.metaKey || e.ctrlKey)) { e.preventDefault(); Palette.open ? closePalette() : openPalette(); return; }
    if (e.key === '\\' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); toggleRail(); return; }
    if (e.key === '/' && !Palette.open && !/^(INPUT|TEXTAREA|SELECT)$/.test((document.activeElement || {}).tagName || '')) { e.preventDefault(); openPalette(); return; }
    if (!Palette.open) return;
    if (e.key === 'Escape') { e.preventDefault(); closePalette(); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); Palette.sel = Math.min(Palette.filtered.length - 1, Palette.sel + 1); paletteRender(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); Palette.sel = Math.max(0, Palette.sel - 1); paletteRender(); }
    else if (e.key === 'Enter') { e.preventDefault(); paletteRun(Palette.sel); }
    else if (e.key === 'Tab') { e.preventDefault(); const inp = document.getElementById('cmdkInput'); if (inp) inp.focus(); }   // trap focus in the modal
});
window.openPalette = openPalette;

/* ---------- boot ---------- */
window.addEventListener('hashchange', () => {
    let r = (location.hash.replace('#/', '') || 'dashboard');
    if (ROUTE_REDIRECT[r]) { location.replace('#/' + ROUTE_REDIRECT[r]); return; }
    if (r === 'containers') { svcTab = 'containers'; r = 'services'; }
    else if (r === 'services') { svcTab = 'services'; }
    if (!PAGES[r]) r = 'dashboard';
    route = r;
    const sb = document.getElementById('sidebar'); if (sb) sb.classList.remove('open');
    closeMore();
    closeDrawer();   // a route change invalidates any open entity detail
    _setMobileView = 'list';   // phone Settings always re-enters at its index
    window.scrollTo(0, 0);
    _animateView = true;
    render();                 // instant paint (skeletons for not-yet-loaded route data)
    if (Store.lastUpdate) refreshOnNav();   // then pull just what this route needs
});
// The top-bar search is a command-palette trigger (no more surprise teleport to Services).
(() => {
    const gs = document.getElementById('globalSearch');
    if (!gs) return;
    gs.readOnly = true; gs.placeholder = 'Search…  (⌘K / Ctrl-K)';
    gs.addEventListener('mousedown', e => { e.preventDefault(); openPalette(); });
    gs.addEventListener('focus', () => { gs.blur(); openPalette(); });
})();

try { if (localStorage.getItem('hl-rail') === '1') document.getElementById('rail').setAttribute('data-collapsed', 'true'); } catch (e) {}
// Personalization: density + motion prefs, custom app name, chosen landing page.
document.body.setAttribute('data-density', uiPref('cc-density', 'comfortable'));
document.body.setAttribute('data-motion', uiPref('cc-motion', 'full'));
if (Store.settings && Store.settings.appName) document.title = Store.settings.appName;
if ((!location.hash || location.hash === '#/' || location.hash === '#') && Store.settings && Store.settings.homeRoute && Store.settings.homeRoute !== 'dashboard') { location.replace('#/' + Store.settings.homeRoute); route = Store.settings.homeRoute; }
// Demo mode: pre-seed history rings with believable curves so hero trend charts
// look alive on first paint instead of filling in over the next few minutes.
if (window.__CC_DEMO__) {
    const seed = (n, fn) => Array.from({ length: n }, (_, i) => fn(i));
    const N = 46;
    History.cpu = seed(N, i => 58 + 14 * Math.sin(i / 6) + 6 * Math.sin(i / 2.3));
    History.mem = seed(N, i => 84 + 2.5 * Math.sin(i / 9));
    History.wanDown = seed(N, i => 6e6 + 5e6 * Math.abs(Math.sin(i / 5)) + 2e6 * Math.sin(i / 1.7));
    History.wanUp = seed(N, i => 1.2e6 + 8e5 * Math.abs(Math.sin(i / 6 + 1)));
    History.clients = seed(N, i => 12 + Math.round(1.5 * Math.sin(i / 8)));
    History.ioRead = seed(N, i => 4e6 + 3e6 * Math.abs(Math.sin(i / 4)));
    History.ioWrite = seed(N, i => 5e7 + 2e7 * Math.sin(i / 5));
    History.mediaBitrate = seed(N, i => 55000 + 8000 * Math.sin(i / 7));
}
render();         // first paint with whatever we have (settings injected)
initTileDnd();    // enable drag-to-reorder on the dashboard tile grid
initCharts();     // hover crosshair + tooltip + synced time-range on live charts
refreshIntegrations();   // integration catalog is static — fetch once (Settings + discovery), not every poll
refreshAll().then(() => { refreshMeta().catch(() => {}); initOnboard(); });   // first-run setup decision after first data
Live.start();     // SSE realtime — status/host/media pushed by the server
setInterval(() => { Live.connected ? reducedTick() : refreshAll(); }, 20000);
// Tick the connection badge between repaints without a full re-render.
setInterval(renderConnBadge, 5000);
// Operations-center service selection — delegated so device/service names with quotes never break it.
document.getElementById('view').addEventListener('click', e => { const el = e.target.closest('[data-svc]'); if (el && el.dataset.svc) { e.preventDefault(); selectSvc(el.dataset.svc); } });
// Near-real-time media activity: while the Applications page is open + visible, refresh Tracearr
// streams on a fast cadence and patch only the command bar + detail + insights (no full-page reload).
setInterval(async () => {
    if ((route !== 'media' && route !== 'automation') || document.hidden) return;
    const jobs = [];
    if (!Live.fresh('media', 15000)) jobs.push(refreshTracearr());   // SSE pushes media at 5s — don't double-fetch
    if (route === 'automation') jobs.push(refreshDownloaders());
    const en = enabledIntegrations(); en.forEach(d => jobs.push(refreshWidget(d.id)));
    await Promise.all(jobs);
    // NOTE: no pushHistory() here — rings stay on the 20s cadence so chart time-axes stay honest;
    // this fast tick only refreshes the live session/queue rows.
    _verdict = null;
    if (!isEditingView() && !_dragKey) render();   // media/automation are cheap single-column repaints
    updateFoot();
}, 8000);
