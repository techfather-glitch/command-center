name: Publish image

# Builds the container image and pushes it to GitHub Container Registry.
# Fires automatically on a version tag (v2.1.0, …); can also be run by hand
# from the Actions tab to (re)publish a specific version.
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag the image (no leading v), e.g. 2.0.0'
        required: true
        default: '2.0.0'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push to ghcr.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version tags
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V"        >> "$GITHUB_OUTPUT"
          echo "minor=${V%.*}"     >> "$GITHUB_OUTPUT"
          echo "Publishing version $V (and ${V%.*}, latest)"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.v.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.v.outputs.minor }}
          labels: |
            org.opencontainers.image.title=Command Center
            org.opencontainers.image.description=A self-hosted, real-time operations console for the homelab.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.v.outputs.version }}
            org.opencontainers.image.licenses=MIT
          provenance: false
